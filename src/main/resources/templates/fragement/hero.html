<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
    Fragment: hero
    Dùng: th:replace="~{fragments/public/hero :: hero}"
    Model attributes (tuỳ chọn):
      heroTitle   - tiêu đề lớn       (default: AUDO RESIDENCE)
      heroSubtitle - subtitle italic   (default: Architectural Sanctuary)
      heroImg      - URL ảnh nền       (default: /images/hero-default.jpg)
      showSearch   - hiện form search  (default: true)
-->
<header th:fragment="hero"
        class="audo-hero position-relative d-flex flex-column justify-content-end align-items-center overflow-hidden">

    <!-- Background image -->
    <div class="position-absolute top-0 start-0 w-100 h-100">
        <img id="hero-img"
             th:src="${heroImg} ?: @{/images/hero-default.jpg}"
             alt="Audo Residence"
             class="w-100 h-100 object-fit-cover"/>
        <div class="audo-hero-gradient position-absolute top-0 start-0 w-100 h-100"></div>
    </div>

    <!-- Text + Form -->
    <div class="position-relative z-1 w-100 text-center text-white pb-5 px-4 px-md-5">

        <h1 class="audo-display reveal mb-2"
            th:text="${heroTitle} ?: 'AUDO RESIDENCE'">AUDO RESIDENCE</h1>

        <p class="audo-subtitle fst-italic mb-5 reveal"
           th:text="${heroSubtitle} ?: 'Architectural Sanctuary'">Architectural Sanctuary</p>

        <!-- Search Form -->
        <div th:if="${showSearch != false}"
             class="bg-white p-1 w-100 mx-auto shadow-lg reveal audo-search-wrapper">
            <form class="d-flex flex-column flex-md-row"
                  th:action="@{/rooms/search}" method="get">

                <div class="flex-fill p-4 text-start border-bottom border-md-end border-secondary-subtle">
                    <label class="audo-label-caps d-block mb-2">Check-in</label>
                    <input type="date" name="checkIn"
                           th:value="${param.checkIn}"
                           class="form-control border-0 p-0 shadow-none audo-form-input"/>
                </div>

                <div class="flex-fill p-4 text-start border-bottom border-md-end border-secondary-subtle">
                    <label class="audo-label-caps d-block mb-2">Check-out</label>
                    <input type="date" name="checkOut"
                           th:value="${param.checkOut}"
                           class="form-control border-0 p-0 shadow-none audo-form-input"/>
                </div>

                <div class="flex-fill p-4 text-start border-bottom border-md-end border-secondary-subtle">
                    <label class="audo-label-caps d-block mb-2">Guests</label>
                    <select name="guests"
                            class="form-select border-0 p-0 shadow-none bg-transparent audo-form-input">
                        <option value="1">1 Adult</option>
                        <option value="2" selected>2 Adults</option>
                        <option value="3">3 Adults</option>
                        <option value="4">4 Adults</option>
                    </select>
                </div>

                <button type="submit"
                        class="btn audo-btn-primary px-5 py-4 d-flex align-items-center justify-content-center gap-2">
                    Search Rooms
                    <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
                </button>

            </form>
        </div>

    </div>
</header>
</body>
</html>
