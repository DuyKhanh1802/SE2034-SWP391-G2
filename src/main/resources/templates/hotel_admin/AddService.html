<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">

<body>
<main layout:fragment="content">

    <section class="service-management-page">

        <div class="service-page-header">
            <h1>Thêm dịch vụ</h1>
            <p>
                Tạo dịch vụ mới cho khách sạn. Ảnh đại diện sẽ được upload lên Cloudinary
                và lưu đường dẫn vào bảng images.
            </p>
        </div>

        <!-- TOAST MESSAGE -->
        <div id="serviceToast" class="service-toast" role="alert" aria-live="assertive">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="serviceToastMessage">Có lỗi xảy ra.</span>
        </div>

        <!-- SERVER ERROR HIDDEN: dùng cho JS show toast 3 giây -->
        <span id="serverErrorMessage"
              th:if="${errorMessage}"
              th:text="${errorMessage}"
              hidden></span>

        <div class="service-card service-form-card">

            <div class="service-card-top">
                <div>
                    <span>FORM</span>
                    <h3>Thông tin dịch vụ</h3>
                </div>

                <a th:href="@{/hotel-admin/services}" class="service-btn ghost">
                    <i class="fa-solid fa-arrow-left"></i>
                    Quay lại
                </a>
            </div>

            <form id="addServiceForm"
                  th:action="@{/hotel-admin/services/add}"
                  th:object="${serviceRequest}"
                  method="post"
                  enctype="multipart/form-data"
                  class="service-add-form"
                  novalidate>

                <div class="service-form-grid">

                    <div class="service-form-group">
                        <label for="name">Tên dịch vụ <span>*</span></label>
                        <input type="text"
                               id="name"
                               th:field="*{name}"
                               placeholder="Ví dụ: Massage đá nóng">
                    </div>

                    <div class="service-form-group">
                        <label for="categoryId">Loại dịch vụ <span>*</span></label>
                        <select id="categoryId"
                                th:field="*{categoryId}">
                            <option value="">-- Chọn loại dịch vụ --</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">
                                Spa
                            </option>
                        </select>
                    </div>

                    <div class="service-form-group">
                        <label for="price">Giá dịch vụ <span>*</span></label>
                        <input type="number"
                               id="price"
                               th:field="*{price}"
                               placeholder="Ví dụ: 350000"
                               min="1"
                               max="100000000"
                               step="1000"
                               inputmode="numeric">
                    </div>

                    <div class="service-form-group">
                        <label for="isAvailable">Trạng thái</label>
                        <select id="isAvailable"
                                th:field="*{isAvailable}">
                            <option th:value="true">Đang khả dụng</option>
                            <option th:value="false">Tạm tắt</option>
                        </select>
                    </div>

                    <div class="service-form-group service-form-full">
                        <label for="imageFile">Ảnh đại diện</label>
                        <input type="file"
                               id="imageFile"
                               th:field="*{imageFile}"
                               accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">

                        <small>
                            Chọn ảnh JPG, JPEG, PNG hoặc WEBP. Kích thước tối đa 5MB.
                        </small>

                        <div id="serviceImagePreview" class="service-image-preview" hidden>
                            <img id="serviceImagePreviewImg" src="" alt="Ảnh xem trước dịch vụ">
                        </div>
                    </div>

                    <div class="service-form-group service-form-full">
                        <label for="description">Mô tả dịch vụ</label>
                        <textarea id="description"
                                  th:field="*{description}"
                                  rows="5"
                                  placeholder="Nhập mô tả ngắn về dịch vụ..."></textarea>
                    </div>

                </div>

                <div class="service-form-actions">
                    <a th:href="@{/hotel-admin/services}" class="service-btn ghost">
                        Hủy
                    </a>

                    <button type="submit" class="service-btn primary">
                        <i class="fa-solid fa-plus"></i>
                        Thêm dịch vụ
                    </button>
                </div>

            </form>

        </div>

    </section>

    <script th:src="@{/js/addService.js}"></script>

</main>
</body>
</html>
