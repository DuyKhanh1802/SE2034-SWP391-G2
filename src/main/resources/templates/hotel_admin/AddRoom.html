<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">

<body>
<main layout:fragment="content">

    <!-- PAGE TITLE -->
    <section class="welcome-section room-page-title">
        <h1>Thêm phòng</h1>
        <p>
            Tạo phòng mới bằng cách chọn hạng phòng,
            số phòng, tầng, trạng thái và ghi chú phòng.
        </p>
    </section>

    <!-- ERROR MESSAGE -->
    <div th:if="${errorMessage}" class="error-toast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${errorMessage}">Số phòng đã tồn tại!</span>
    </div>

    <!-- FORM -->
    <section class="room-form-card">

        <div class="form-heading">
            <span>QUẢN LÝ PHÒNG</span>
            <h3>Thông tin phòng</h3>
        </div>

        <form th:action="@{/hotel-admin/list-room/add}" method="post">

            <div class="row g-4">

                <!-- HẠNG PHÒNG -->
                <div class="col-md-6">
                    <label class="form-label">Hạng phòng</label>

                    <select name="variantId"
                            id="variantSelect"
                            class="form-select room-input"
                            required>
                        <option value="">Chọn hạng phòng</option>

                        <option th:each="variant : ${roomTypeVariants}"
                                th:value="${variant.id}"
                                th:text="${variant.variantName}"
                                th:selected="${variant.id == selectedVariantId}">
                            Standard Room - City View
                        </option>
                    </select>
                </div>

                <!-- SỐ PHÒNG -->
                <div class="col-md-6">
                    <label class="form-label">Số phòng</label>

                    <select name="roomNumber"
                            id="roomNumberSelect"
                            class="form-select room-input"
                            required>
                        <option value="">Chọn số phòng</option>

                        <option th:each="option : ${roomNumberOptions}"
                                th:value="${option.roomNumber}"
                                th:text="${option.roomNumber}"
                                th:attr="data-floor=${option.floor}"
                                th:selected="${option.roomNumber == roomNumber}">
                            101
                        </option>
                    </select>
                </div>

                <!-- TẦNG -->
                <div class="col-md-6">
                    <label class="form-label">Tầng</label>

                    <input type="number"
                           name="floor"
                           id="floorInput"
                           class="form-control room-input"
                           placeholder="Tầng sẽ tự hiển thị"
                           th:value="${floor}"
                           readonly
                           required>
                </div>

                <!-- TRẠNG THÁI -->
                <div class="col-md-6">
                    <label class="form-label">Trạng thái</label>

                    <select name="status"
                            class="form-select room-input"
                            required>
                        <option value="">Chọn trạng thái</option>

                        <option th:each="status : ${roomStatuses}"
                                th:value="${status}"
                                th:selected="${status == selectedStatus}"
                                th:text="${status.name() == 'AVAILABLE' ? 'Còn trống' :
                                         (status.name() == 'OCCUPIED' ? 'Đang sử dụng' :
                                         (status.name() == 'MAINTENANCE' ? 'Bảo trì' : status))}">
                            Còn trống
                        </option>
                    </select>
                </div>

                <!-- GHI CHÚ -->
                <div class="col-md-12">
                    <label class="form-label">Ghi chú</label>

                    <textarea name="note"
                              class="form-control room-input"
                              rows="3"
                              maxlength="500"
                              placeholder="Ví dụ: Phòng gần thang máy, phòng cần kiểm tra điều hòa..."
                              th:text="${note}"></textarea>
                </div>

            </div>

            <div class="form-actions">
                <a th:href="@{/hotel-admin/list-room}" class="cancel-btn">
                    Hủy
                </a>

                <button type="submit" class="save-room-btn">
                    <i class="fa-solid fa-check"></i>
                    Lưu phòng
                </button>
            </div>

        </form>

    </section>

    <script>
        setTimeout(function () {
            const toast = document.querySelector('.error-toast');
            if (toast) {
                toast.style.display = 'none';
            }
        }, 3000);

        const roomNumberSelect = document.getElementById('roomNumberSelect');
        const floorInput = document.getElementById('floorInput');

        function updateFloorByRoomNumber() {
            const selectedOption = roomNumberSelect.options[roomNumberSelect.selectedIndex];

            if (!selectedOption || !selectedOption.value) {
                floorInput.value = '';
                return;
            }

            floorInput.value = selectedOption.getAttribute('data-floor');
        }

        roomNumberSelect.addEventListener('change', updateFloorByRoomNumber);

        updateFloorByRoomNumber();
    </script>

</main>
</body>
</html>
