<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="page-title">
        <h1>Phân quyền vai trò</h1>
        <p>Gán các quyền thao tác cho từng vai trò. Người dùng có nhiều vai trò sẽ nhận hợp của tất cả quyền.</p>
    </section>

    <div th:if="${successMessage}" class="admin-alert success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="admin-alert warning" th:text="${errorMessage}"></div>

    <section class="admin-card">
        <form class="permission-role-filter" method="get" th:action="@{/system-admin/role-permissions}">
            <select class="filter-control" name="role" onchange="this.form.submit()">
                <option th:each="roleOption : ${roles}"
                        th:value="${roleOption.key}"
                        th:text="${roleOption.value}"
                        th:selected="${roleOption.key == selectedRole}">
                    Vai trò
                </option>
            </select>
        </form>
    </section>

    <section class="admin-card">
        <form class="permission-form" method="post" th:action="@{/system-admin/role-permissions}">
            <input type="hidden" name="role" th:value="${selectedRole}">

            <div class="section-header">
                <span>DANH SÁCH QUYỀN</span>
                <p class="settings-note">
                    Các quyền được khóa là quyền truy cập tối thiểu để vai trò có thể vào màn hình mặc định sau đăng
                    nhập.
                </p>
            </div>


            <div class="permission-grid">
                <label class="permission-item" th:each="permission : ${permissions}">
                    <input type="checkbox"
                           name="permissionIds"
                           th:value="${permission.id}"
                           th:checked="${selectedPermissionIds.contains(permission.id)}"
                           th:disabled="${requiredPermissionIds.contains(permission.id)}">
                    <span>
                        <strong th:text="${permission.name}">Tên quyền</strong>
                        <small th:text="${permission.code}">PERMISSION_CODE</small>
                    </span>
                </label>
            </div>

            <button class="btn-admin-primary" type="submit">
                <i class="fa-solid fa-shield-halved"></i>
                Lưu phân quyền
            </button>
        </form>
    </section>
</main>
</body>
</html>
