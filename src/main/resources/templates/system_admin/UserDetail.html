<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">

<body>

<main layout:fragment="content">
    <section class="page-title">
        <h1>Chi tiết người dùng</h1>
        <p>Xem thông tin định danh và liên hệ của tài khoản.</p>
    </section>

    <section class="admin-card">
        <div class="detail-header">
            <a th:href="@{/system-admin/list-user}" class="btn-admin-outline">
                <i class="fa-solid fa-arrow-left"></i>
                Quay lại
            </a>

            <a sec:authorize="hasAnyAuthority('USER_MANAGE','USER_APPROVE')"
               th:href="@{/system-admin/list-user/{id}/edit(id=${user.id})}" class="btn-admin-primary">
                <i class="fa-regular fa-pen-to-square"></i>
                Chỉnh sửa
            </a>
        </div>

        <div class="user-detail-layout">
            <div class="user-avatar">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="user-detail-content">
                <div class="section-header">
                    <span>THÔNG TIN TÀI KHOẢN</span>
                    <h3 th:text="${displayName}">Nguyễn Văn A</h3>
                </div>

                <div class="detail-grid">
                    <div class="detail-item">
                        <span>ID</span>
                        <strong th:text="${user.id}">1</strong>
                    </div>

                    <div class="detail-item">
                        <span>Họ và tên</span>
                        <strong th:text="${displayName}">Nguyễn Văn A</strong>
                    </div>

                    <div class="detail-item">
                        <span>Giới tính</span>
                        <strong th:text="${genderLabel}">Chưa có</strong>
                    </div>

                    <div class="detail-item">
                        <span>Email</span>
                        <strong th:text="${user.email != null ? user.email : 'Chưa có'}">email@example.com</strong>
                    </div>

                    <div class="detail-item">
                        <span>Số điện thoại</span>
                        <strong th:text="${user.phone != null ? user.phone : 'Chưa có'}">0900000000</strong>
                    </div>

                    <div class="detail-item">
                        <span>Số định danh</span>
                        <strong th:text="${user.identityNumber != null ? user.identityNumber : 'Chưa có'}">012345678</strong>
                    </div>

                    <div class="detail-item">
                        <span>Vai trò</span>
                        <strong th:text="${roleLabel}">Quản trị hệ thống</strong>
                    </div>

                </div>
            </div>
        </div>
    </section>
</main>

</body>
</html>
