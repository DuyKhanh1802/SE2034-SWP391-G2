<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="module-header">
        <div>
            <p>Quỹ khách sạn</p>
            <h1>Quản lý quỹ</h1>
        </div>
        <a class="btn-secondary-action" th:href="@{/manager/transactions}">Lịch sử giao dịch</a>
    </section>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="metric-grid">
        <div class="metric-card">
            <span>Tổng thu</span>
            <strong th:text="${#numbers.formatDecimal(totalIncome, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong>
        </div>
        <div class="metric-card">
            <span>Tổng chi</span>
            <strong th:text="${#numbers.formatDecimal(totalExpense, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong>
        </div>
        <div class="metric-card">
            <span>Tổng quỹ</span>
            <strong th:text="${#numbers.formatDecimal(currentBalance, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong>
        </div>
    </section>

    <section class="panel">
        <h2>Lịch sử thao tác quỹ gần đây</h2>
        <table class="module-table">
            <thead>
            <tr>
                <th>Chứng từ</th>
                <th>Loại</th>
                <th>Số tiền</th>
                <th>Nội dung</th>
                <th>Thời gian</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="transaction : ${recentTransactions}">
                <td th:text="${transaction.documentCode}">PT</td>
                <td th:text="${transaction.type.displayName}">Thu</td>
                <td th:text="${#numbers.formatDecimal(transaction.amount, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</td>
                <td th:text="${transaction.description}">Nội dung</td>
                <td th:text="${#temporals.format(transaction.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
