<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="module-header">
        <div>
            <p>Hotel Fund</p>
            <h1>Quản lý quỹ</h1>
        </div>
        <a class="btn-secondary-action" th:href="@{/manager/transactions}">Lịch sử giao dịch</a>
    </section>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="metric-grid">
        <div class="metric-card"><span>Vốn đầu kỳ</span><strong th:text="${#numbers.formatDecimal(openingBalance, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong></div>
        <div class="metric-card"><span>Tổng thu</span><strong th:text="${#numbers.formatDecimal(totalIncome, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong></div>
        <div class="metric-card"><span>Tổng chi</span><strong th:text="${#numbers.formatDecimal(totalExpense, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong></div>
        <div class="metric-card"><span>Tổng quỹ</span><strong th:text="${#numbers.formatDecimal(currentBalance, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</strong></div>
    </section>

    <section class="detail-grid">
        <form class="panel form-panel" th:action="@{/manager/fund/opening-balance}" method="post">
            <h2>Cấu hình vốn đầu kỳ</h2>
            <input type="number" min="0" step="1000" name="openingBalance" th:value="${openingBalance}" required>
            <button type="submit">Lưu vốn đầu kỳ</button>
        </form>

        <form class="panel form-panel" th:action="@{/manager/fund/manual-transaction}" method="post">
            <h2>Lập phiếu thu/chi thủ công</h2>
            <select name="type" required>
                <option value="INCOME">Phiếu thu</option>
                <option value="EXPENSE">Phiếu chi</option>
            </select>
            <input type="number" min="1" step="1000" name="amount" placeholder="Số tiền" required>
            <textarea name="description" rows="3" placeholder="Nội dung"></textarea>
            <button type="submit">Tạo phiếu</button>
        </form>
    </section>

    <section class="panel">
        <h2>Lịch sử thao tác gần đây</h2>
        <table class="module-table">
            <thead><tr><th>Mã</th><th>Loại</th><th>Số tiền</th><th>Nội dung</th><th>Thời gian</th></tr></thead>
            <tbody>
            <tr th:each="transaction : ${recentTransactions}">
                <td th:text="${transaction.code}">CT</td>
                <td th:text="${transaction.type.name() == 'INCOME' ? 'Thu' : 'Chi'}">Thu</td>
                <td th:text="${#numbers.formatDecimal(transaction.amount, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</td>
                <td th:text="${transaction.description}">Nội dung</td>
                <td th:text="${#temporals.format(transaction.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
