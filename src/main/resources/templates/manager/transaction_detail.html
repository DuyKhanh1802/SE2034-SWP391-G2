<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="module-header">
        <div>
            <p>Cash Flow Detail</p>
            <h1 th:text="${transaction.code}">CT</h1>
        </div>
        <a class="btn-secondary-action" th:href="@{/manager/transactions}">Quay lai</a>
    </section>

    <section class="detail-grid">
        <div class="panel">
            <h2>Thong tin dong tien</h2>
            <dl class="detail-list">
                <dt>Loai</dt>
                <dd th:text="${transaction.type.name() == 'INCOME' ? 'Thu' : 'Chi'}">Thu</dd>
                <dt>Chung tu</dt>
                <dd th:text="${transaction.documentCode}">PT</dd>
                <dt>Nhom</dt>
                <dd th:text="${transaction.category}">CATEGORY</dd>
                <dt>So tien</dt>
                <dd th:text="${#numbers.formatDecimal(transaction.amount, 0, 'POINT', 0, 'COMMA') + ' VND'}">0 VND</dd>
                <dt>Mo ta</dt>
                <dd th:text="${transaction.description ?: 'Khong co'}">Mo ta</dd>
                <dt>Thoi gian</dt>
                <dd th:text="${#temporals.format(transaction.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</dd>
            </dl>
        </div>
        <div class="panel">
            <h2>Nguon phat sinh</h2>
            <dl class="detail-list">
                <dt>Loai nguon</dt>
                <dd th:text="${transaction.sourceType}">PAYMENT</dd>
                <dt>Ma nguon</dt>
                <dd th:text="${transaction.sourceId ?: 'Khong co'}">1</dd>
                <dt>Nguoi tao</dt>
                <dd th:text="${transaction.createdBy != null ? transaction.createdBy.email : 'He thong'}">manager</dd>
            </dl>
        </div>
    </section>
</main>
</body>
</html>
