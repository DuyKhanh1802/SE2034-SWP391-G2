<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
<header class="page-header">
            <div>
                <div class="breadcrumb-custom">
                    Management / Promotions / Add
                </div>
                <h1>Add Promotion</h1>
            </div>
        </header>

        <section class="content-section">
            <div class="form-card">

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">
                    Error message
                </div>

                <form id="promotionForm"
                      th:action="@{/manager/promotions/add}"
                      th:object="${promotion}"
                      method="post">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Promotion Code</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{code}"
                                   placeholder="Example: SUMMER25"
                                   pattern=".*\S.*"
                                   title="Promotion code cannot be blank."
                                   onblur="this.value = this.value.trim()"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Promotion Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   placeholder="Example: Summer Holiday"
                                   pattern=".*\S.*"
                                   title="Promotion name cannot be blank."
                                   onblur="this.value = this.value.trim()"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Discount Type</label>
                            <select class="form-select"
                                    th:field="*{discountType}"
                                    id="discountType"
                                    required>
                                <option value="">Select discount type</option>
                                <option th:each="type : ${discountTypes}"
                                        th:value="${type}"
                                        th:text="${type}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Discount Value</label>
                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{discountValue}"
                                   id="discountValue"
                                   placeholder="Example: 20 or 50000"
                                   required>
                            <small class="form-hint">
                                Use 20 for 20% discount, or 50000 for 50,000 VND discount.
                            </small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Max Discount</label>
                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{maxDiscount}"
                                   id="maxDiscount"
                                   placeholder="Only for percentage discount">
                            <small class="form-hint">
                                Only used for percentage discounts. Leave blank for fixed amount.
                            </small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Usage Limit</label>
                            <input type="number"
                                   class="form-control"
                                   th:field="*{usageLimit}"
                                   id="usageLimit"
                                   placeholder="Example: 100"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Valid From</label>
                            <input type="datetime-local"
                                   class="form-control"
                                   th:field="*{validFromInput}"
                                   id="validFromInput"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Valid To</label>
                            <input type="datetime-local"
                                   class="form-control"
                                   th:field="*{validToInput}"
                                   id="validToInput"
                                   required>
                        </div>

                        <div class="col-md-12">
                            <div class="form-check mt-2">
                                <input class="form-check-input"
                                       type="checkbox"
                                       th:field="*{isActive}"
                                       id="isActive">
                                <label class="form-check-label" for="isActive">
                                    Active
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/manager/promotions}" href="/manager/promotions" class="btn-cancel">
                            Cancel
                        </a>

                        <button type="submit" class="btn-save">
                            Save Promotion
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <footer class="footer">
            Â© 2026 ViHotel. All rights reserved.
        </footer>

<script>
    const promotionForm = document.getElementById("promotionForm");
    const discountType = document.getElementById("discountType");
    const discountValue = document.getElementById("discountValue");
    const maxDiscount = document.getElementById("maxDiscount");
    const usageLimit = document.getElementById("usageLimit");
    const validFromInput = document.getElementById("validFromInput");
    const validToInput = document.getElementById("validToInput");

    function showError(input, message) {
        input.setCustomValidity(message);
        input.reportValidity();
    }

    function clearError(input) {
        input.setCustomValidity("");
    }

    function updateMaxDiscountState() {
        const isPercentage = discountType.value === "PERCENTAGE";

        maxDiscount.disabled = !isPercentage;

        if (!isPercentage) {
            maxDiscount.value = "";
            clearError(maxDiscount);
        }
    }

    function validateDiscountValue() {
        const value = Number(discountValue.value);

        if (discountValue.value !== "" && value <= 0) {
            showError(discountValue, "Discount value must be greater than 0.");
            return false;
        }

        if (discountType.value === "PERCENTAGE" && discountValue.value !== "" && value > 100) {
            showError(discountValue, "Percentage discount cannot be greater than 100.");
            return false;
        }

        clearError(discountValue);
        return true;
    }

    function validateMaxDiscount() {
        const value = Number(maxDiscount.value);

        if (discountType.value === "PERCENTAGE"
            && maxDiscount.value !== ""
            && value <= 0) {
            showError(maxDiscount, "Max discount must be greater than 0.");
            return false;
        }

        clearError(maxDiscount);
        return true;
    }

    function validateUsageLimit() {
        const value = Number(usageLimit.value);

        if (usageLimit.value !== "" && value <= 0) {
            showError(usageLimit, "Usage limit must be greater than 0.");
            return false;
        }

        clearError(usageLimit);
        return true;
    }

    function formatDateTimeLocal(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");

        return `${year}-${month}-${day}T${hour}:${minute}`;
    }

    function setupDateLimits() {
        const now = new Date();
        const minDateTime = formatDateTimeLocal(now);

        validFromInput.min = minDateTime;
        validToInput.min = minDateTime;
    }

    function updateValidToMinDate() {
        if (validFromInput.value !== "") {
            validToInput.min = validFromInput.value;
        }
    }

    discountType.addEventListener("change", function () {
        updateMaxDiscountState();
        validateDiscountValue();
        validateMaxDiscount();
    });

    discountValue.addEventListener("input", validateDiscountValue);
    maxDiscount.addEventListener("input", validateMaxDiscount);
    usageLimit.addEventListener("input", validateUsageLimit);

    promotionForm.addEventListener("submit", function (event) {
        const isDiscountValueValid = validateDiscountValue();
        const isMaxDiscountValid = validateMaxDiscount();
        const isUsageLimitValid = validateUsageLimit();

        if (!isDiscountValueValid || !isMaxDiscountValid || !isUsageLimitValid) {
            event.preventDefault();
        }
    });

    setupDateLimits();
    validFromInput.addEventListener("change", updateValidToMinDate);

    updateMaxDiscountState();
</script>
</main>
</body>
</html>
