<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="module-header">
        <div>
            <p>Dòng tiền</p>
            <h1>Lập phiếu thu/chi</h1>
        </div>
        <a class="btn-secondary-action" th:href="@{/manager/transactions}">Quay lại</a>
    </section>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form class="panel form-panel" th:action="@{/manager/transactions/create}" method="post">
        <h2>Thông tin phiếu</h2>

        <label for="type">Loại phiếu</label>
        <select id="type" name="type" required>
            <option value="INCOME">Phiếu thu</option>
            <option value="EXPENSE">Phiếu chi</option>
        </select>

        <label for="amount">Số tiền</label>
        <input id="amount" type="number" min="1" step="1000" name="amount" placeholder="Nhập số tiền" required>

        <label for="description">Nội dung</label>
        <textarea id="description" name="description" rows="4" placeholder="Nhập nội dung phiếu"></textarea>

        <button type="submit">Tạo phiếu</button>
    </form>
</main>
</body>
</html>
