<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="module-header">
        <div>
            <p>Dòng tiền</p>
            <h1>Lập phiếu thu/chi</h1>
        </div>
    </section>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form class="panel form-panel"
          id="cashTransactionForm"
          th:action="@{/manager/transactions/create}"
          th:object="${voucher}"
          method="post">
        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <h2>Thông tin phiếu</h2>

        <div class="form-grid">
            <div>
                <label for="type">Loại phiếu</label>
                <select id="type" th:field="*{type}" required>
                    <option th:each="typeOption : ${transactionTypes}"
                            th:value="${typeOption.name()}"
                            th:text="${typeOption.displayName}">
                        Phiếu thu
                    </option>
                </select>
                <p class="form-hint">Phiếu thu ghi nhận dòng tiền vào, phiếu chi ghi nhận dòng tiền ra.</p>
            </div>

            <div>
                <label for="amount">Số tiền</label>
                <input id="amount"
                       type="number"
                       min="1"
                       step="1"
                       th:field="*{amount}"
                       placeholder="Nhập số tiền"
                       required>
                <p class="form-hint">Chỉ nhập số dương, hệ thống tự xử lý dấu tiền theo loại phiếu.</p>
            </div>

            <div>
                <label for="paymentMethod">Phương thức thanh toán</label>
                <select id="paymentMethod" th:field="*{paymentMethod}" required>
                    <option value="">Chọn phương thức</option>
                    <option th:each="methodOption : ${paymentMethods}"
                            th:value="${methodOption.name()}"
                            th:text="${methodOption.label}">
                        Tiền mặt
                    </option>
                </select>
                <p class="form-hint">Ghi lại cách phát sinh dòng tiền để dễ đối soát.</p>
            </div>
        </div>

        <label for="description">Nội dung phiếu</label>
        <textarea id="description"
                  th:field="*{description}"
                  rows="4"
                  maxlength="300"
                  placeholder="Ví dụ: Thu tiền dịch vụ giặt là, chi mua vật tư..."
                  required></textarea>
        <p class="form-hint">Nội dung giúp manager kiểm tra lại lý do phát sinh dòng tiền.</p>

        <div class="form-actions">
            <a class="btn-secondary-action" th:href="@{/manager/transactions}">Hủy</a>
            <button type="submit">Tạo phiếu</button>
        </div>
    </form>
    <script th:src="@{/js/cashTransactionForm.js}"></script>
</main>
</body>
</html>
