<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
<section class="page-wrapper">

<!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1>Bookings</h1>
                    <p>
                        Manage all guest reservations, track check-in status, and handle portfolio
                        adjustments from a unified reception view.
                    </p>
                </div>

                <div class="page-actions">
                    <a th:href="@{/receptionist/bookings/add-walk-in}" class="btn-main">
                        NEW RESERVATION
                    </a>
                </div>
            </div>

            <!-- Filter Bar -->
            <form th:action="@{/receptionist/bookings}" method="get" class="filter-bar">

                <div class="filter-group guest-search">
                    <label>GUEST SEARCH</label>
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="ID, Guest name or Room">
                </div>

                <div class="filter-group date-range">
                    <label>DATE RANGE</label>

                    <div class="date-inputs">
                        <input type="date" name="checkIn" th:value="${checkIn}">
                        <span>/</span>
                        <input type="date" name="checkOut" th:value="${checkOut}">
                    </div>
                </div>

                <div class="filter-group status-filter">
                    <label>STATUS</label>

                    <select name="status">
                        <option value="" th:selected="${status == null or status == ''}">All Status</option>
                        <option value="CONFIRMED" th:selected="${status == 'CONFIRMED'}">Confirmed</option>
                        <option value="CHECKED_IN" th:selected="${status == 'CHECKED_IN'}">Checked In</option>
                        <option value="CHECKED_OUT" th:selected="${status == 'CHECKED_OUT'}">Checked Out</option>
                        <option value="PENDING" th:selected="${status == 'PENDING'}">Pending</option>
                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">Cancelled</option>
                    </select>
                </div>

                <div class="filter-button-wrap">
                    <button type="submit" class="btn-filter">
                        <i class="bi bi-funnel"></i>
                        SEARCH
                    </button>
                </div>

            </form>

            <!-- Booking Table -->
            <div class="table-responsive booking-table-wrap">
                <table class="table booking-table align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>GUEST NAME</th>
                        <th>ROOM</th>
                        <th>CHECK-IN</th>
                        <th>CHECK-OUT</th>
                        <th>STATUS</th>
                        <th class="text-end">ACTIONS</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="booking : ${bookings}">
                        <td class="booking-id" th:text="'#' + ${booking.bookingReference}"></td>

                        <td>
                            <div class="guest-info">
                                <div>
                                    <div class="guest-name" th:text="${booking.guestName}"></div>
                                </div>
                            </div>
                        </td>

                        <td th:text="${booking.roomName}"></td>

                        <td th:text="${booking.checkInDate}"></td>

                        <td th:text="${booking.checkOutDate}"></td>

                        <td>
        <span class="status-badge"
              th:classappend="${booking.status == 'CONFIRMED'} ? ' status-confirmed' :
                              (${booking.status == 'CHECKED_IN'} ? ' status-checked-in' :
                              (${booking.status == 'CHECKED_OUT'} ? ' status-checked-out' :
                              (${booking.status == 'PENDING'} ? ' status-pending' : ' status-cancelled')))"
              th:text="${booking.status}">
        </span>
                        </td>

                        <td class="text-end">
                            <div class="table-actions">
                                <a th:href="@{/receptionist/bookings/view/{id}(id=${booking.bookingId})}">
                                    VIEW
                                </a>

                                <a th:href="@{/receptionist/bookings/edit/{id}(id=${booking.bookingId})}"
                                   class="action-strong">
                                    EDIT
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${bookings == null or #lists.isEmpty(bookings)}">
                        <td colspan="7" class="text-center py-5">
                            No bookings found.
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-row">
                <p>SHOWING 1-10 OF 48 BOOKINGS</p>

                <div class="pagination-buttons">
                    <button><i class="bi bi-chevron-left"></i></button>
                    <button class="active">1</button>
                    <button>2</button>
                    <button>3</button>
                    <button><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
</section>
</main>
</body>
</html>
