<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
<section class="page-wrapper">

<div class="page-title">
                <h1>New Walk-in Booking</h1>
                <p>Create a new immediate reservation for arriving guests.</p>
            </div>

            <div th:if="${errorMessage}" class="walkin-alert">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${errorMessage}">Invalid booking information.</span>
            </div>

            <form th:action="@{/receptionist/bookings/add-walk-in}"
                  th:object="${request}"
                  method="post"
                  class="walkin-form">

                <div class="booking-layout">

                    <!-- Left Column -->
                    <div class="left-column">

                        <!-- Date and Guest Count -->
                        <div class="booking-input-grid">

                            <div class="form-group-line">
                                <label>CHECK-IN DATE</label>
                                <input type="date" th:field="*{checkInDate}">
                            </div>

                            <div class="form-group-line">
                                <label>CHECK-OUT DATE</label>
                                <input type="date" th:field="*{checkOutDate}">
                            </div>

                            <div class="form-group-line">
                                <label>ADULTS</label>
                                <input type="number" th:field="*{adults}" min="1" placeholder="Enter adults">
                            </div>

                            <div class="form-group-line">
                                <label>CHILDREN</label>
                                <input type="number" th:field="*{children}" min="0" placeholder="Enter children">
                            </div>

                        </div>

                        <!-- Available Rooms -->
                        <div class="room-section">
                            <div class="room-section-header">
                                <label>AVAILABLE ROOMS</label>
                                <span th:text="${#lists.size(availableRooms)} + ' AVAILABLE'">0 AVAILABLE</span>
                            </div>

                            <div class="room-grid">

                                <div class="room-option" th:each="room : ${availableRooms}">
                                    <input class="room-checkbox"
                                           type="checkbox"
                                           name="roomIds"
                                           th:id="'room' + ${room.roomId}"
                                           th:value="${room.roomId}">

                                    <label class="room-card"
                                           th:for="'room' + ${room.roomId}"
                                           th:attr="data-price=${room.basePrice}">
                                        <span class="room-number" th:text="${room.roomNumber}"></span>

                                        <span class="room-info">
        <span class="room-type" th:text="${room.roomTypeName}"></span>
        <span class="room-price"
              th:text="${#numbers.formatDecimal(room.basePrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">
        </span>
    </span>
                                    </label>
                                </div>

                                <div th:if="${availableRooms == null or #lists.isEmpty(availableRooms)}"
                                     class="empty-rooms">
                                    No available rooms for selected dates.
                                </div>

                            </div>
                        </div>

                    </div>

                    <!-- Right Column -->
                    <div class="right-column">

                        <div class="guest-card">
                            <h2>Guest Information</h2>

                            <div class="guest-form">
                                <div class="form-group-line">
                                    <label>FIRST NAME</label>
                                    <input type="text" th:field="*{firstName}" placeholder="Johnathan">
                                </div>

                                <div class="form-group-line">
                                    <label>LAST NAME</label>
                                    <input type="text" th:field="*{lastName}" placeholder="Doe">
                                </div>

                                <div class="form-group-line">
                                    <label>EMAIL ADDRESS</label>
                                    <input type="email" th:field="*{email}" placeholder="john.doe@example.com">
                                </div>

                                <div class="form-group-line">
                                    <label>PHONE NUMBER</label>
                                    <input type="tel" th:field="*{phoneNumber}" placeholder="(+84)382271507">
                                </div>

                                <div class="form-group-line">
                                    <label>GENDER</label>
                                    <select th:field="*{gender}">
                                        <option value="">Select gender</option>
                                        <option value="MALE">Male</option>
                                        <option value="FEMALE">Female</option>
                                        <option value="OTHER">Other</option>
                                    </select>
                                </div>

                                <div class="form-group-line">
                                    <label>DATE OF BIRTH</label>
                                    <input type="date" th:field="*{dateOfBirth}">
                                </div>

                                <div class="form-group-line">
                                    <label>COUNTRY</label>
                                    <select th:field="*{countryId}">
                                        <option value="">Select country</option>
                                        <option th:each="country : ${countries}"
                                                th:value="${country.id}"
                                                th:text="${country.countryName}">
                                            Vietnam
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group-line">
                                    <label>IDENTITY NUMBER</label>
                                    <input type="text" th:field="*{identityNumber}" placeholder="Passport / CCCD">
                                </div>

                                <div class="form-group-line form-group-wide">
                                    <label>ADDITIONAL NOTES</label>
                                    <textarea th:field="*{notes}" rows="3"
                                              placeholder="Special requests, allergies, or early check-in info..."></textarea>
                                </div>
                            </div>

                            <div class="price-summary">
                                <div class="summary-row">
                                    <span id="nightLabel">Room Charge</span>
                                    <span id="roomCharge">0 VND</span>
                                </div>

                                <div class="summary-row">
                                    <span>Taxes & Fees (12%)</span>
                                    <span id="taxAmount">0 VND</span>
                                </div>

                                <div class="summary-total">
                                    <span>Total Price</span>
                                    <span id="totalPrice">0 VND</span>
                                </div>
                            </div>

                            <div class="action-buttons">
                                <button type="submit" name="action" value="create-check-in" class="btn-create-checkin">
                                    CREATE & CHECK-IN
                                </button>

                                <button type="submit" name="action" value="create-only" class="btn-create-only">
                                    CREATE ONLY
                                </button>
                            </div>
                        </div>

                    </div>

                </div>

            </form>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const checkInInput = document.querySelector("input[name='checkInDate']");
        const checkOutInput = document.querySelector("input[name='checkOutDate']");
        const roomCheckboxes = document.querySelectorAll(".room-checkbox");

        const nightLabel = document.getElementById("nightLabel");
        const roomCharge = document.getElementById("roomCharge");
        const taxAmount = document.getElementById("taxAmount");
        const totalPrice = document.getElementById("totalPrice");

        function formatVnd(amount) {
            return new Intl.NumberFormat("vi-VN").format(amount) + " VND";
        }

        function getNights() {
            const checkInDate = new Date(checkInInput.value);
            const checkOutDate = new Date(checkOutInput.value);

            if (!checkInInput.value || !checkOutInput.value || checkOutDate <= checkInDate) {
                return 0;
            }

            const oneDay = 1000 * 60 * 60 * 24;
            return Math.round((checkOutDate - checkInDate) / oneDay);
        }

        function updateSummary() {
            const nights = getNights();
            let selectedRoomTotalPerNight = 0;

            roomCheckboxes.forEach(function (checkbox) {
                if (checkbox.checked) {
                    const card = checkbox.nextElementSibling;
                    const price = Number(card.dataset.price || 0);
                    selectedRoomTotalPerNight += price;
                }
            });

            const roomTotal = selectedRoomTotalPerNight * nights;
            const tax = Math.round(roomTotal * 0.12);
            const total = roomTotal + tax;

            nightLabel.textContent = nights > 0
                ? "Room Charge (" + nights + " Nights)"
                : "Room Charge";

            roomCharge.textContent = formatVnd(roomTotal);
            taxAmount.textContent = formatVnd(tax);
            totalPrice.textContent = formatVnd(total);
        }

        roomCheckboxes.forEach(function (checkbox) {
            checkbox.addEventListener("change", updateSummary);
        });

        checkInInput.addEventListener("change", updateSummary);
        checkOutInput.addEventListener("change", updateSummary);

        updateSummary();
    });
</script>
</section>
</main>
</body>
</html>
