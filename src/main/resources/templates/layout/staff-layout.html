<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:replace="~{fragment/staff/head :: head}">
</head>

<body>

<div class="dashboard-wrapper">

    <div th:replace="~{fragment/staff/sidebar :: sidebar}">
    </div>

    <div class="main-content">

        <div th:replace="~{fragment/staff/header :: header}">
        </div>

        <main class="page-container"
              layout:fragment="content">

        </main>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/vn.js"></script>

<script th:src="@{/js/date-picker.js}"></script>
<th:block layout:fragment="scripts"></th:block>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".profile-dropdown-btn").forEach(function (button) {
            const profile = button.closest(".staff-profile");

            button.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();

                document.querySelectorAll(".staff-profile.is-open").forEach(function (openedProfile) {
                    if (openedProfile !== profile) {
                        openedProfile.classList.remove("is-open");
                        openedProfile.querySelector(".profile-dropdown-btn").setAttribute("aria-expanded", "false");
                    }
                });

                profile.classList.toggle("is-open");
                button.setAttribute("aria-expanded", profile.classList.contains("is-open"));

                if (!profile.classList.contains("is-open")) {
                    profile.querySelectorAll(".notification-menu-item.is-open").forEach(function (item) {
                        item.classList.remove("is-open");
                        item.querySelector(".notification-toggle").setAttribute("aria-expanded", "false");
                    });
                }
            });
        });

        document.querySelectorAll(".notification-toggle").forEach(function (button) {
            button.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();

                const menuItem = button.closest(".notification-menu-item");
                menuItem.classList.toggle("is-open");
                button.setAttribute("aria-expanded", menuItem.classList.contains("is-open"));
            });
        });

        document.addEventListener("click", function (event) {
            if (event.target.closest(".staff-profile")) {
                return;
            }

            document.querySelectorAll(".staff-profile.is-open").forEach(function (profile) {
                profile.classList.remove("is-open");
                profile.querySelector(".profile-dropdown-btn").setAttribute("aria-expanded", "false");
                profile.querySelectorAll(".notification-menu-item.is-open").forEach(function (item) {
                    item.classList.remove("is-open");
                    item.querySelector(".notification-toggle").setAttribute("aria-expanded", "false");
                });
            });
        });
    });
</script>

</body>

</html>
