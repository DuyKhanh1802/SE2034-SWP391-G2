<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head th:replace="~{fragment/staff/head :: head}"></head>

<body>
<div class="d-flex min-vh-100">

    <div th:replace="~{fragment/staff/sidebar :: sidebar}"></div>

    <div class="flex-grow-1 d-flex flex-column w-100 overflow-hidden">

        <div th:replace="~{fragment/staff/header :: header}"></div>

        <main layout:fragment="content" class="flex-grow-1 overflow-auto bg-light">
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebarToggle = document.getElementById("sidebarToggle");
        const sidebar = document.querySelector(".audo-sidebar");

        if (sidebarToggle && sidebar) {
            sidebarToggle.addEventListener("click", function(event) {
                event.preventDefault();
                // Thêm class để ẩn/hiện sidebar trên màn hình nhỏ
                sidebar.classList.toggle("d-none");
                sidebar.classList.toggle("d-flex");
            });
        }
    });
</script>
</body>
</html>
