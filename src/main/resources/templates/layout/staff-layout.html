<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <th:block th:replace="~{fragments/admin/head :: head}"></th:block>
    <!-- CSS riêng từng trang -->
    <th:block layout:fragment="page-css"></th:block>
</head>
<body>

<div class="audo-wrapper">

    <th:block th:replace="~{fragments/admin/sidebar :: sidebar}"></th:block>

    <div class="audo-main">

        <th:block th:replace="~{fragments/admin/header :: header}"></th:block>

        <main class="audo-content" layout:fragment="content"></main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle sidebar mobile
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
        document.querySelector('.audo-sidebar')?.classList.toggle('show');
    });
</script>
<!-- JS riêng từng trang -->
<th:block layout:fragment="page-js"></th:block>

</body>
</html>
