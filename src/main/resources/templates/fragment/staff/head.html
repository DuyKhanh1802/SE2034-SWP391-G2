<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${pageTitle} ?: 'ViHotel HMS'">
        ViHotel HMS
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">

    <link rel="stylesheet"
          th:href="@{/common/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/common/header.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/system-admin')}"
          th:href="@{/system_admin/css/user-management.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/hotel-admin')}"
          th:href="@{/hotel_admin/Admin.css}">

    <link rel="stylesheet"
          th:if="${#strings.equals(currentUri ?: '', '/hotel-admin/dashboard')}"
          th:href="@{/hotel_admin/Dashboard.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/hotel-admin/list-room') or #strings.startsWith(currentUri ?: '', '/hotel-admin/rooms')}"
          th:href="@{/hotel_admin/RoomManagement.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/hotel-admin/promotions')}"
          th:href="@{/hotel_admin/promotions.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/hotel-admin/promotions/add') or #strings.startsWith(currentUri ?: '', '/hotel-admin/promotions/edit/')}"
          href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <link rel="stylesheet"
          th:if="${#strings.equals(currentUri ?: '', '/manager/dashboard')}"
          th:href="@{/manager/Dashboard.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/manager/transactions')
                  or #strings.startsWith(currentUri ?: '', '/manager/fund')
                  or #strings.startsWith(currentUri ?: '', '/manager/reports')}"
          th:href="@{/manager/manager-modules.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/storekeeper/inventory')}"
          th:href="@{/storekeeper/Inventory.css}">

    <link rel="stylesheet"
          th:if="${#strings.equals(currentUri ?: '', '/receptionist/dashboard')}"
          th:href="@{/receptionist/Dashboard.css}">

    <link rel="stylesheet"
          th:if="${#strings.equals(currentUri ?: '', '/receptionist/bookings')}"
          th:href="@{/receptionist/ListBooking.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/receptionist/bookings/add-walk-in')}"
          th:href="@{/receptionist/AddWalkInBooking.css}">

    <link rel="stylesheet"
          th:if="${#strings.startsWith(currentUri ?: '', '/profile')}"
          th:href="@{/profile/EditProfile.css}">
</head>

</html>
