<aside class="sidebar">
    <div>
        <div class="logo">
            VIH0TEL
        </div>

        <ul class="menu list-unstyled">
            <li>
                <a th:href="@{/admin/dashboard}">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>Bảng điều khiển</span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/rooms}">
                    <i class="fa-solid fa-building"></i>
                    <span>Quản lý phòng</span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/staff}">
                    <i class="fa-solid fa-id-badge"></i>
                    <span>Nhân viên</span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/services}">
                    <i class="fa-solid fa-bell-concierge"></i>
                    <span>Dịch vụ</span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/incidents}">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Sự cố</span>
                </a>
            </li>

            <li class="active">
                <a th:href="@{/profile/edit}">
                    <i class="fa-regular fa-user"></i>
                    <span>Hồ sơ cá nhân</span>
                </a>
            </li>
        </ul>
    </div>

    <a class="sidebar-user text-decoration-none" th:href="@{/profile/edit}">
        <img th:src="${currentUser != null and currentUser.avatarUrl != null
                    ? currentUser.avatarUrl
                    : 'https://i.pravatar.cc/50'}"
             alt="admin">

        <div>
            <h6 th:text="${currentUser != null
                        ? currentUser.firstName + ' ' + currentUser.lastName
                        : 'QUẢN TRỊ VIÊN'}">
                QUẢN TRỊ VIÊN
            </h6>
            <p>Trang quản trị</p>
        </div>
    </a>
