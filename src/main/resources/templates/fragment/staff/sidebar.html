<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
    Sidebar tự highlight active theo biến "currentUri" do controller truyền vào.
    Ví dụ trong controller: model.addAttribute("currentUri", request.getRequestURI());

    Menu hiện/ẩn theo session.account.role.roleName:
    RECEPTIONIST, KITCHEN_STAFF, SPA_STAFF, HOUSEKEEPING, MANAGER, ADMIN
-->
<nav th:fragment="sidebar" class="audo-sidebar d-flex flex-column">

    <!-- Brand + Role badge -->
    <div class="audo-sidebar-brand px-4 py-4 border-bottom d-flex align-items-center gap-2">
        <span class="fw-semibold">AUDO</span>
        <span class="badge bg-secondary fw-normal audo-label-caps"
              th:text="${session.account?.role?.roleName}">ROLE</span>
    </div>

    <ul class="nav flex-column px-2 py-3 flex-grow-1 gap-1">

        <!-- ── RECEPTION ── -->
        <th:block th:if="${session.account?.role?.roleName == 'RECEPTIONIST'
                        or session.account?.role?.roleName == 'MANAGER'
                        or session.account?.role?.roleName == 'ADMIN'}">

            <li><span class="audo-sidebar-section">RECEPTION</span></li>

            <li class="nav-item">
                <a th:href="@{/receptionist/bookings}"
                   th:classappend="${#strings.startsWith(currentUri, '/receptionist/bookings')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-calendar-check fa-fw me-2"></i>Bookings
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/receptionist/check-in}"
                   th:classappend="${#strings.startsWith(currentUri, '/receptionist/check-in')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-sign-in-alt fa-fw me-2"></i>Check-in / Check-out
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/receptionist/guests}"
                   th:classappend="${#strings.startsWith(currentUri, '/receptionist/guests')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-user fa-fw me-2"></i>Guests
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/receptionist/payments}"
                   th:classappend="${#strings.startsWith(currentUri, '/receptionist/payments')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-credit-card fa-fw me-2"></i>Payments
                </a>
            </li>
        </th:block>

        <!-- ── SERVICES (Kitchen + Spa) ── -->
        <th:block th:if="${session.account?.role?.roleName == 'KITCHEN_STAFF'
                        or session.account?.role?.roleName == 'SPA_STAFF'
                        or session.account?.role?.roleName == 'MANAGER'
                        or session.account?.role?.roleName == 'ADMIN'}">

            <li class="mt-2"><span class="audo-sidebar-section">SERVICES</span></li>

            <li class="nav-item">
                <a th:href="@{/staff/work-orders}"
                   th:classappend="${#strings.startsWith(currentUri, '/staff/work-orders')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-concierge-bell fa-fw me-2"></i>Work Orders
                </a>
            </li>
        </th:block>

        <!-- ── HOUSEKEEPING ── -->
        <th:block th:if="${session.account?.role?.roleName == 'HOUSEKEEPING'
                        or session.account?.role?.roleName == 'MANAGER'
                        or session.account?.role?.roleName == 'ADMIN'}">

            <li class="mt-2"><span class="audo-sidebar-section">HOUSEKEEPING</span></li>

            <li class="nav-item">
                <a th:href="@{/housekeeping/rooms}"
                   th:classappend="${#strings.startsWith(currentUri, '/housekeeping/rooms')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-bed fa-fw me-2"></i>Room Status
                </a>
            </li>
        </th:block>

        <!-- ── MANAGEMENT ── -->
        <th:block th:if="${session.account?.role?.roleName == 'MANAGER'
                        or session.account?.role?.roleName == 'ADMIN'}">

            <li class="mt-2"><span class="audo-sidebar-section">MANAGEMENT</span></li>

            <li class="nav-item">
                <a th:href="@{/admin/dashboard}"
                   th:classappend="${#strings.startsWith(currentUri, '/admin/dashboard')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-chart-bar fa-fw me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/accounts}"
                   th:classappend="${#strings.startsWith(currentUri, '/admin/accounts')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-users fa-fw me-2"></i>Accounts
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/rooms}"
                   th:classappend="${#strings.startsWith(currentUri, '/admin/rooms')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-hotel fa-fw me-2"></i>Rooms &amp; Types
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/promotions}"
                   th:classappend="${#strings.startsWith(currentUri, '/admin/promotions')} ? ' active' : ''"
                   class="nav-link audo-sidebar-link">
                    <i class="fa fa-tag fa-fw me-2"></i>Promotions
                </a>
            </li>
        </th:block>

    </ul>

    <!-- Logout -->
    <div class="px-4 py-3 border-top">
        <a th:href="@{/logout}" class="nav-link audo-sidebar-link text-danger">
            <i class="fa fa-sign-out-alt fa-fw me-2"></i>Logout
        </a>
    </div>

</nav>
</body>
</html>
