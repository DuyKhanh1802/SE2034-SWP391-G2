<div xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     th:fragment="sidebar"
     class="sidebar">

    <div class="sidebar-header">
        <h2>V'Hotel</h2>
    </div>

    <!-- SYSTEM ADMIN -->
    <ul class="sidebar-menu"
        sec:authorize="hasRole('SYSTEM_ADMIN')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'SYSTEM_ADMIN'}">
        <li sec:authorize="hasAuthority('USER_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/system-admin/list-user')} ? 'active' : ''">
            <a th:href="@{/system-admin/list-user}">
                <i class="fas fa-users"></i>
                <span>Quản lý người dùng</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_PERMISSION_MANAGE')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/system-admin/role-permissions')} ? 'active' : ''">
            <a th:href="@{/system-admin/role-permissions}">
                <i class="fas fa-user-shield"></i>
                <span>Phân quyền vai trò</span>
            </a>
        </li>
    </ul>

    <!-- HOTEL ADMIN -->
    <ul class="sidebar-menu"
        sec:authorize="hasRole('HOTEL_ADMIN')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'HOTEL_ADMIN'}">
        <li sec:authorize="hasAuthority('HOTEL_DASHBOARD_VIEW')"
            th:classappend="${#strings.equals(currentUri ?: '', '/hotel-admin/dashboard')} ? 'active' : ''">
            <a th:href="@{/hotel-admin/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('ROOM_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/hotel-admin/list-room') or #strings.startsWith(currentUri ?: '', '/hotel-admin/rooms')} ? 'active' : ''">
            <a th:href="@{/hotel-admin/list-room}">
                <i class="fas fa-bed"></i>
                <span>Quản lý phòng</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('PROMOTION_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/hotel-admin/promotions')} ? 'active' : ''">
            <a th:href="@{/hotel-admin/promotions}">
                <i class="fas fa-tags"></i>
                <span>Quản lý khuyến mãi</span>
            </a>
        </li>
    </ul>

    <!-- MANAGER -->
    <ul class="sidebar-menu"
        sec:authorize="hasRole('MANAGER')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'MANAGER'}">
        <li sec:authorize="hasAuthority('MANAGER_DASHBOARD_VIEW')"
            th:classappend="${#strings.equals(currentUri ?: '', '/manager/dashboard')} ? 'active' : ''">
            <a th:href="@{/manager/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Tổng quan</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('FINANCE_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/manager/transactions')} ? 'active' : ''">
            <a th:href="@{/manager/transactions}">
                <i class="fas fa-money-bill-transfer"></i>
                <span>Lịch sử giao dịch</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('FINANCE_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/manager/fund')} ? 'active' : ''">
            <a th:href="@{/manager/fund}">
                <i class="fas fa-wallet"></i>
                <span>Quản lý quỹ</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('REPORT_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/manager/reports')} ? 'active' : ''">
            <a th:href="@{/manager/reports}">
                <i class="fas fa-chart-pie"></i>
                <span>Báo cáo</span>
            </a>
        </li>
    </ul>

    <!-- STOREKEEPER -->
    <ul class="sidebar-menu"
        sec:authorize="hasRole('STOREKEEPER')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'STOREKEEPER'}">
        <li sec:authorize="hasAuthority('INVENTORY_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/storekeeper/inventory')} ? 'active' : ''">
            <a th:href="@{/storekeeper/inventory}">
                <i class="fas fa-boxes-stacked"></i>
                <span>Quản lý kho hàng</span>
            </a>
        </li>
    </ul>

    <!-- RECEPTIONIST -->
    <ul class="sidebar-menu"
        sec:authorize="hasRole('RECEPTIONIST')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'RECEPTIONIST'}">
        <li sec:authorize="hasAuthority('RECEPTION_DASHBOARD_VIEW')"
            th:classappend="${#strings.equals(currentUri ?: '', '/receptionist/dashboard')} ? 'active' : ''">
            <a th:href="@{/receptionist/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Tổng quan</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/rooms')} ? 'active' : ''">
            <a th:href="@{/receptionist/rooms}">
                <i class="fas fa-bed"></i>
                <span>Danh sách phòng</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('BOOKING_VIEW')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/bookings')} ? 'active' : ''">
            <a th:href="@{/receptionist/bookings}">
                <i class="fas fa-calendar-check"></i>
                <span>Đặt phòng</span>
            </a>
        </li>
        <li sec:authorize="hasAuthority('CHECK_IN')"
            th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/check-in')} ? 'active' : ''">
            <a th:href="@{/receptionist/check-in}">
                <i class="fas fa-right-to-bracket"></i>
                <span>Nhận phòng</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/check-out')} ? 'active' : ''">
            <a th:href="@{/receptionist/check-out}">
                <i class="fas fa-right-from-bracket"></i>
                <span>Trả phòng</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/invoices')} ? 'active' : ''">
            <a th:href="@{/receptionist/invoices}">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Hoá đơn</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-section-spacer"></div>

    <ul class="sidebar-menu">
    </ul>
</div>
