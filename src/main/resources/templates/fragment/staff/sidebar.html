<div xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     th:fragment="sidebar"
     class="sidebar">

    <div class="sidebar-header">
        <h2>ViHotel</h2>
    </div>

    <ul class="sidebar-menu"
        sec:authorize="hasRole('SYSTEM_ADMIN')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'SYSTEM_ADMIN'}">
        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/system-admin/list-user')} ? 'active' : ''">
            <a th:href="@{/system-admin/list-user}">
                <i class="fas fa-users"></i>
                <span>Quản lý người dùng</span>
            </a>
        </li>
    </ul>

    <ul class="sidebar-menu"
        sec:authorize="hasRole('HOTEL_ADMIN')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'HOTEL_ADMIN'}">
        <li th:classappend="${#strings.equals(currentUri ?: '', '/hotel-admin/dashboard')} ? 'active' : ''">
            <a th:href="@{/hotel-admin/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/hotel-admin/list-room') or #strings.startsWith(currentUri ?: '', '/hotel-admin/rooms')} ? 'active' : ''">
            <a th:href="@{/hotel-admin/list-room}">
                <i class="fas fa-bed"></i>
                <span>Phòng</span>
            </a>
        </li>
    </ul>

    <ul class="sidebar-menu"
        sec:authorize="hasRole('MANAGER')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'MANAGER'}">
        <li th:classappend="${#strings.equals(currentUri ?: '', '/manager/dashboard')} ? 'active' : ''">
            <a th:href="@{/manager/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Tổng quan</span>
            </a>
        </li>

        <li>
            <a href="#">
                <i class="fas fa-calendar-check"></i>
                <span>Đặt phòng</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/manager/promotions')} ? 'active' : ''">
            <a th:href="@{/manager/promotions}">
                <i class="fas fa-tags"></i>
                <span>Khuyến mãi</span>
            </a>
        </li>

        <li>
            <a href="#">
                <i class="fas fa-users"></i>
                <span>Khách hàng</span>
            </a>
        </li>

        <li>
            <a href="#">
                <i class="fas fa-chart-pie"></i>
                <span>Báo cáo</span>
            </a>
        </li>

    </ul>

    <ul class="sidebar-menu"
        sec:authorize="hasRole('RECEPTIONIST')"
        th:if="${session.CURRENT_ACTIVE_ROLE == 'RECEPTIONIST'}">
        <li th:classappend="${#strings.equals(currentUri ?: '', '/receptionist/dashboard')} ? 'active' : ''">
            <a th:href="@{/receptionist/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/bookings')} ? 'active' : ''">
            <a th:href="@{/receptionist/bookings}">
                <i class="fas fa-calendar-check"></i>
                <span>Đặt phòng</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-section-spacer"></div>

    <ul class="sidebar-menu">

    </ul>
</div>
