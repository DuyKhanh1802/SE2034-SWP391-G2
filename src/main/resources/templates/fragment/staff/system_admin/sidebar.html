<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="sidebar"
     class="sidebar">

    <div class="sidebar-header">
        <h2>V'Hotel</h2>
    </div>

    <ul class="sidebar-menu" th:if="${session.CURRENT_ACTIVE_ROLE == 'SYSTEM_ADMIN'}">
        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/list-user')} ? 'active' : ''">
            <a th:href="@{/admin/list-user}">
                <i class="fas fa-users"></i>
                <span>Quản lý người dùng</span>
            </a>
        </li>
    </ul>

    <ul class="sidebar-menu" th:if="${session.CURRENT_ACTIVE_ROLE == 'HOTEL_ADMIN'}">
        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/list_room') or #strings.startsWith(currentUri ?: '', '/admin/rooms')} ? 'active' : ''">
            <a th:href="@{/admin/list_room}">
                <i class="fas fa-bed"></i>
                <span>Phòng</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/services')} ? 'active' : ''">
            <a href="#">
                <i class="fas fa-bell-concierge"></i>
                <span>Dịch vụ</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/promotions')} ? 'active' : ''">
            <a href="#">
                <i class="fas fa-tags"></i>
                <span>Khuyến mãi</span>
            </a>
        </li>
    </ul>

    <ul class="sidebar-menu" th:if="${session.CURRENT_ACTIVE_ROLE == 'MANAGER'}">
        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/manager')} ? 'active' : ''">
            <a th:href="@{/manager/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/manager/promotions')} ? 'active' : ''">
            <a th:href="@{/manager/promotions}">
                <i class="fas fa-tags"></i>
                <span>Khuyến mãi</span>
            </a>
        </li>
    </ul>

    <ul class="sidebar-menu" th:if="${session.CURRENT_ACTIVE_ROLE == 'RECEPTIONIST'}">
        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/dashboard')} ? 'active' : ''">
            <a th:href="@{/receptionist/dashboard}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/bookings')} ? 'active' : ''">
            <a th:href="@{/receptionist/bookings}">
                <i class="fas fa-calendar-check"></i>
                <span>Đặt phòng</span>
            </a>
        </li>
    </ul>
</div>
