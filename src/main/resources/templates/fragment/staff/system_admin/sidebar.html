<div xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     th:fragment="sidebar"
     class="sidebar">

    <div class="sidebar-header">
        <h2>V'Hotel</h2>
    </div>

    <ul class="sidebar-menu" sec:authorize="hasRole('SYSTEM_ADMIN')">

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/account')} ? 'active' : ''">
            <a th:href="@{/admin/account}">
                <i class="fas fa-users"></i>
                <span>Quản lý người dùng</span>
            </a>
        </li>

        <li>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </button>
            </form>
        </li>

    </ul>

    <ul class="sidebar-menu" sec:authorize="hasRole('HOTEL_ADMIN')">

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/list_room') or #strings.startsWith(currentUri ?: '', '/admin/rooms')} ? 'active' : ''">
            <a th:href="@{/admin/list_room}">
                <i class="fas fa-bed"></i>
                <span>Phòng</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/services')} ? 'active' : ''">
            <a href="#">
                <i class="fas fa-bell-concierge"></i>
                <span>Dịch vụ</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/promotions')} ? 'active' : ''">
            <a href="#">
                <i class="fas fa-tags"></i>
                <span>Khuyến mãi</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/profile')} ? 'active' : ''">
            <a href="#">
                <i class="fas fa-user"></i>
                <span>Hồ sơ</span>
            </a>
        </li>

        <li>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </button>
            </form>
        </li>

    </ul>

    <ul class="sidebar-menu" sec:authorize="!hasAnyRole('SYSTEM_ADMIN','HOTEL_ADMIN')">

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/manager/promotions')} ? 'active' : ''"
            sec:authorize="hasRole('MANAGER')">
            <a th:href="@{/manager/promotions}">
                <i class="fas fa-tags"></i>
                <span>Khuyến mãi</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri ?: '', '/receptionist/bookings')} ? 'active' : ''"
            sec:authorize="hasRole('RECEPTIONIST')">
            <a th:href="@{/receptionist/bookings}">
                <i class="fas fa-calendar-check"></i>
                <span>Đặt phòng</span>
            </a>
        </li>

        <li>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </button>
            </form>
        </li>

    </ul>

</div>
