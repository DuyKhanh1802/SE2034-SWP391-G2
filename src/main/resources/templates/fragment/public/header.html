<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:fragment="header-css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Montserrat', sans-serif; background-color: #FCFBF9; color: #1A1A1A; }
            h1, h2, h3, .brand-logo { font-family: 'Playfair Display', serif; }

            /* Header Custom */
            .navbar { background-color: #FCFBF9 !important; border-bottom: 1px solid #EAE6DF; padding: 15px 0; }
            .brand-logo { font-size: 24px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; text-decoration: none; color: #1A1A1A; }
            .nav-link { text-transform: uppercase; font-size: 11px; letter-spacing: 2px; color: #555 !important; font-weight: 500; padding: 0 12px !important; }
            .nav-link:hover { color: #000 !important; }
            .btn-reserve { background-color: #043927; color: #fff !important; font-size: 12px; letter-spacing: 2px; padding: 10px 24px; border-radius: 0; text-transform: uppercase; font-weight: 500; transition: all 0.3s ease; }
            .btn-reserve:hover { background-color: #03291C; opacity: 0.9; }
        </style>
    </div>
</head>
<body>

<nav th:fragment="header-nav" class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container-fluid px-5">
        <div class="d-none d-lg-block">
            <span class="d-block" style="font-size: 10px; letter-spacing: 2px; font-weight: bold;">ROSEWOOD</span>
            <span style="font-size: 9px; letter-spacing: 1px; color: #777;">HONG KONG</span>
        </div>

        <button class="navbar-toggler" type="text/collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <div class="d-flex flex-column align-items-center w-100">
                <a class="brand-logo mb-2 d-none d-lg-block" th:href="@{/}">ROSEWOOD</a>

                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#">Discover</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Overview</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Offers</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Accommodation</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Dining</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Wellness</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Experiences</a></li>
                </ul>
            </div>
        </div>

        <div class="d-flex align-items-center">
            <a th:href="@{/reserve}" class="btn btn-reserve">Reserve</a>
        </div>
    </div>
</nav>

</body>
</html>
