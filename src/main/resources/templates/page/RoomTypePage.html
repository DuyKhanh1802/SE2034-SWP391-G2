<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Room Types - V'Hotel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/page/HomePage.css}">
    <link rel="stylesheet" th:href="@{/page/RoomTypePage.css}">
</head>

<body>

<div th:replace="~{fragment/public/header :: publicHeader}"></div>

<main class="room-type-page">

    <section class="room-type-hero">
        <div class="room-type-hero-content">
            <h1>Rooms & Suites</h1>
            <p>
                Khám phá các hạng phòng tại V'Hotel, nơi không gian nghỉ dưỡng tinh tế
                được kết hợp cùng tiện nghi hiện đại và dịch vụ tận tâm.
            </p>
        </div>
    </section>

    <section class="room-type-banner">
        <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=2000&auto=format&fit=crop"
             alt="V'Hotel rooms and suites">
    </section>

    <section class="room-type-list">

        <article class="room-type-row"
                 th:each="roomType, iterStat : ${roomTypes}"
                 th:classappend="${iterStat.odd} ? ' reverse' : ''">

            <div class="room-type-content">
                <p class="section-label">V'HOTEL HANOI</p>

                <h2 th:text="${roomType.name}">
                    Deluxe Room
                </h2>

                <p class="room-description"
                   th:text="${roomType.description}">
                    Elegant room description.
                </p>

                <div class="room-info">
    <span>
        <i class="bi bi-people"></i>
        <span th:text="${roomType.maxAdults}">2</span>
        adults
        ·
        <span th:text="${roomType.maxChildren}">1</span>
        child
    </span>

                    <span>
        <i class="bi bi-arrows-fullscreen"></i>
        <span th:text="${roomType.roomSize}">25</span>
        m²
    </span>

                    <span>
        From
        <strong th:text="${#numbers.formatDecimal(roomType.basePrice, 0, 'COMMA', 0, 'POINT')}">
            0
        </strong>
        VND / night
    </span>
                </div>

                <div class="room-type-actions">
                    <a th:href="@{/room-types/{id}(id=${roomType.id})}" class="btn-dark-luxury">
                        Khám phá
                    </a>


                </div>
            </div>

            <div class="room-type-image">
                <img th:if="${roomType.imageUrl != null}"
                     th:src="${roomType.imageUrl}"
                     th:alt="${roomType.name}">

                <div th:if="${roomType.imageUrl == null}" class="room-type-placeholder">
                    <span th:text="${roomType.name}">Room Type</span>
                </div>
            </div>

        </article>

    </section>

</main>

<div th:replace="~{fragment/public/footer :: publicFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home.js}"></script>

</body>
</html>
