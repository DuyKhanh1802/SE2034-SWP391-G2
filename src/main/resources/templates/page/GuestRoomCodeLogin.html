<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V'Hotel Hanoi | Room Code Login</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/auth/auth-base.css}">
    <link rel="stylesheet" th:href="@{/auth/Login.css}">
</head>

<body>

<div class="shell">

    <div class="panel-left">
        <img th:src="'https://i.pinimg.com/736x/4b/17/01/4b1701adbebca62f9771777df839a384.jpg'"
             alt="V'Hotel Hanoi lobby">

        <div class="left-content">
            <div class="wordmark">
                <div class="wordmark-line"></div>
                <div class="wordmark-text">Est. 2018 &middot; Hanoi, Vietnam</div>
            </div>

            <div class="brand-block">
                <div class="brand-eyebrow">Luxury Boutique Collection</div>
                <div class="brand-name">
                    V'HOTEL
                    <span>Hanoi</span>
                </div>
                <div class="brand-rule"></div>
                <div class="brand-tagline">Guest Room Access</div>
            </div>
        </div>

        <div class="ribbon">ROOM CODE ACCESS</div>
    </div>

    <div class="panel-right">
        <div class="form-wrap">

            <div class="badge">
                <div class="badge-dot"></div>
                <div class="badge-text">Guest Access</div>
            </div>

            <h1 class="form-heading">Room<br><em>Login.</em></h1>

            <p class="form-sub">
                Enter your email and room code<br>
                to access your stay information.
            </p>

            <div class="h-rule"></div>

            <div th:if="${errorMessage}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${errorMessage}">
                    Email hoặc mã phòng không hợp lệ.
                </span>
            </div>

            <form th:action="@{/guest/login}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email"
                           id="email"
                           name="email"
                           th:value="${email}"
                           placeholder="name@example.com"
                           required>
                </div>

                <div class="field">
                    <label for="roomCode">Room Code</label>
                    <input type="text"
                           id="roomCode"
                           name="roomCode"
                           th:value="${roomCode}"
                           maxlength="8"
                           placeholder="G56YC2Y6"
                           style="text-transform: uppercase"
                           required>
                </div>

                <button type="submit" class="btn-primary">
                    <span>ACCESS ROOM</span>
                </button>
            </form>

            <div class="or-row">OR</div>

            <a th:href="@{/auth/login}" class="btn-ghost room-code-link">
                BACK TO SIGN IN
            </a>

            <div class="foot-note">
                Back to V'Hotel Hanoi?
                <a th:href="@{/home}">Go to homepage</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
