<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V'Hotel Hanoi | Đăng Nhập Bằng Mã Phòng</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Noto+Serif+Display:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/auth/auth-base.css}">
    <link rel="stylesheet" th:href="@{/auth/Login.css}">
</head>

<body>

<div class="shell">

    <div class="panel-left">
        <img th:src="'https://i.pinimg.com/736x/4b/17/01/4b1701adbebca62f9771777df839a384.jpg'"
             alt="Sảnh V'Hotel Hanoi">

        <div class="left-content">
            <div class="wordmark">
                <div class="wordmark-line"></div>
                <div class="wordmark-text">Thành lập 2018 &middot; Hà Nội, Việt Nam</div>
            </div>

            <div class="brand-block">
                <div class="brand-eyebrow">Bộ Sưu Tập Boutique Sang Trọng</div>
                <div class="brand-name">
                    V'HOTEL
                    <span>Hanoi</span>
                </div>
                <div class="brand-rule"></div>
                <div class="brand-tagline">Truy Cập Phòng Khách</div>
            </div>
        </div>

    </div>

    <div class="panel-right">
        <div class="form-wrap">

            <div class="badge">
                <div class="badge-dot"></div>
                <div class="badge-text">Dành Cho Khách</div>
            </div>

            <h1 class="form-heading">Đăng Nhập<br><em>Bằng Phòng.</em></h1>

            <p class="form-sub">
                Nhập email và mã phòng của bạn<br>
                để xem thông tin lưu trú.
            </p>

            <div class="h-rule"></div>

            <div th:if="${errorMessage}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${errorMessage}">
                    Email hoặc mã phòng không hợp lệ.
                </span>
            </div>

            <form th:action="@{/guest/login}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <div class="field">
                    <label for="email">Địa Chỉ Email</label>
                    <input type="email"
                           id="email"
                           name="email"
                           th:value="${email}"
                           placeholder="ten@vidu.com"
                           required>
                </div>

                <div class="field">
                    <label for="roomCode">Mã Phòng</label>
                    <input type="text"
                           id="roomCode"
                           name="roomCode"
                           th:value="${roomCode}"
                           maxlength="8"
                           placeholder="G56YC2Y6"
                           style="text-transform: uppercase"
                           required>
                </div>

                <button type="submit" class="btn-primary">
                    <span>TRUY CẬP PHÒNG</span>
                </button>
            </form>

            <div class="or-row">HOẶC</div>

            <a th:href="@{/auth/login}" class="btn-ghost room-code-link">
                QUAY LẠI ĐĂNG NHẬP
            </a>

            <div class="foot-note">
                Quay lại V'Hotel Hanoi?
                <a th:href="@{/home}">Về trang chủ</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
