<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>
<main layout:fragment="content">
    <section class="page-title">
        <h1>Chỉnh sửa hàng hóa</h1>
        <p>Cập nhật thông tin nhận diện và ngưỡng cảnh báo. Số lượng tồn chỉ thay đổi qua nghiệp vụ kho.</p>
    </section>

    <div th:if="${errorMessage}" class="admin-alert warning" th:text="${errorMessage}"></div>

    <section class="admin-card detail-header">
        <div><span class="eyebrow" th:text="${item.code}"></span><h2 th:text="${item.name}"></h2></div>
        <a class="btn-admin-outline" th:href="@{/storekeeper/inventory/{id}(id=${item.id})}"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
    </section>

    <section class="admin-card">
        <form class="admin-form" method="post" th:action="@{/storekeeper/inventory/{id}/edit(id=${item.id})}">
            <div class="form-grid">
                <div><label>Tên hàng hóa</label><input class="form-control-admin" name="name" th:value="${item.name}" maxlength="150" required></div>
                <div><label>Loại hàng</label><input class="form-control-admin" name="category" th:value="${item.category}" maxlength="100"></div>
                <div><label>Đơn vị tính</label><input class="form-control-admin" name="unit" th:value="${item.unit}" maxlength="30" required></div>
                <div><label>Mức tồn tối thiểu</label><input class="form-control-admin" type="number" name="minimumQuantity" th:value="${item.minimumQuantity}" step="0.01" min="0" required></div>
                <div><label>Tồn hiện tại</label><input class="form-control-admin" th:value="${item.currentQuantity + ' ' + item.unit}" disabled></div>
                <div><label>Giá vốn bình quân</label><input class="form-control-admin" th:value="${#numbers.formatDecimal(item.unitCost, 0, 'POINT', 0, 'COMMA') + ' VND'}" disabled></div>
            </div>
            <div class="detail-actions mt-2">
                <a class="btn-admin-outline" th:href="@{/storekeeper/inventory/{id}(id=${item.id})}">Hủy</a>
                <button class="btn-admin-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
