<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password Error - ViHotel</title>
</head>
<body>

<h2>Reset Password Failed</h2>

<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<a th:href="@{/auth/forgot-password}">Request a new reset link</a>

</body>
</html>
