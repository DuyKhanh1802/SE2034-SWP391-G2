<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V'Hotel Hanoi | Forgot Password</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/auth/auth-base.css}">
    <link rel="stylesheet" th:href="@{/auth/Login.css}">
</head>
<body>

<div class="shell">

    <div class="panel-left">
        <img th:src="'https://i.pinimg.com/736x/4b/17/01/4b1701adbebca62f9771777df839a384.jpg'"
             alt="V'Hotel Hanoi lobby">

        <div class="left-content">
            <div class="wordmark">
                <div class="wordmark-line"></div>
                <div class="wordmark-text">Est. 2018 &middot; Hanoi, Vietnam</div>
            </div>

            <div class="brand-block">
                <div class="brand-eyebrow">Luxury Boutique Collection</div>
                <div class="brand-name">
                    V'HOTEL
                    <span>Hanoi</span>
                </div>
                <div class="brand-rule"></div>
                <div class="brand-tagline">Crafted by Design</div>
            </div>
        </div>

        <div class="ribbon">36 ROOMS &amp; SUITES</div>
    </div>

    <div class="panel-right">
        <div class="form-wrap">

            <div class="badge">
                <div class="badge-dot"></div>
                <div class="badge-text">Password Recovery</div>
            </div>

            <h1 class="form-heading">Forgot<br><em>Password.</em></h1>
            <p class="form-sub">
                Enter your registered email address.<br>
                We will send you a reset password link.
            </p>

            <div class="h-rule"></div>

            <div th:if="${successMessage}" class="alert alert-success">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/auth/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <button type="submit" class="btn-primary">
                    <span>SEND OTP</span>
                </button>
            </form>

            <div class="foot-note">
                Remember your password?
                <a th:href="@{/auth/login}">Back to sign in</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
