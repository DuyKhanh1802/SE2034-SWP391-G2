    <!DOCTYPE html>
    <html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>V'Hotel Hanoi | Tạo Tài Khoản</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Noto+Serif+Display:wght@400;500;600;700&display=swap"
              rel="stylesheet">
        <link rel="stylesheet" th:href="@{/auth/auth-base.css}">
        <link rel="stylesheet" th:href="@{/auth/Register.css}">
    </head>
    <body>

    <div class="shell">

        <div class="panel-left">
            <img th:src="'https://i.pinimg.com/736x/4b/17/01/4b1701adbebca62f9771777df839a384.jpg'" alt="Sảnh V'Hotel Hanoi">
            <div class="left-content">
                <div class="wordmark">
                    <div class="wordmark-line"></div>
                    <div class="wordmark-text">Thành lập 2018 &middot; Hà Nội, Việt Nam</div>
                </div>
                <div class="brand-block">
                    <div class="brand-eyebrow">Bộ Sưu Tập Boutique Sang Trọng</div>
                    <div class="brand-name">
                        V'HOTEL
                        <span>Hanoi</span>
                    </div>
                    <div class="brand-rule"></div>
                    <div class="brand-tagline">Kiến Tạo Từ Thiết Kế</div>
                </div>
            </div>

        </div>

        <div class="panel-right">
            <div class="form-wrap">

                <div class="badge">
                    <div class="badge-dot"></div>
                    <div class="badge-text">Đăng Ký</div>
                </div>

                <h1 class="form-heading">Bắt Đầu<br><em>Hành Trình.</em></h1>
                <p class="form-sub">Trải nghiệm tiêu chuẩn mới của dịch vụ lưu trú boutique hiện đại tại Hà Nội.</p>

                <div class="h-rule"></div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${successMessage}"></span>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}">

                    <div class="field-row">
                        <div class="field">
                            <label for="firstName">Tên</label>
                            <input type="text" id="firstName" th:field="*{firstName}"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" placeholder="Minh" autocomplete="given-name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}">
                                <i class="bi bi-exclamation-circle"></i> <span th:errors="*{firstName}"></span>
                            </div>
                        </div>

                        <div class="field">
                            <label for="lastName">Họ</label>
                            <input type="text" id="lastName" th:field="*{lastName}"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" placeholder="Nguyễn" autocomplete="family-name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}">
                                <i class="bi bi-exclamation-circle"></i> <span th:errors="*{lastName}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="email">Địa Chỉ Email</label>
                        <input type="email" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="ten@vidu.com" autocomplete="email">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}">
                            <i class="bi bi-exclamation-circle"></i> <span th:errors="*{email}"></span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="countryId">Quốc Gia / Khu Vực</label>
                        <select id="countryId" th:field="*{countryId}"
                                th:classappend="${#fields.hasErrors('countryId')} ? 'is-invalid'" onchange="syncPhoneCode(this)">
                            <option value="">Chọn quốc gia của bạn…</option>
                            <option th:each="c : ${countries}"
                                    th:value="${c.id}"
                                    th:text="${c.countryName}"
                                    th:attr="data-phone=${c.phoneCode}"
                                    th:selected="${registerRequest.countryId == c.id}">
                            </option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('countryId')}">
                            <i class="bi bi-exclamation-circle"></i> <span th:errors="*{countryId}"></span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="phone">Số Điện Thoại</label>
                        <div class="input-group-custom">
                            <span class="phone-code-badge" id="phoneCodeBadge">
                                <span th:text="${registerRequest.phoneCode != null && !registerRequest.phoneCode.isEmpty() ? registerRequest.phoneCode : '—'}">—</span>
                            </span>
                            <input type="hidden" id="phoneCode" th:field="*{phoneCode}">
                            <input type="tel" id="phone" th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'" placeholder="000 000 000" autocomplete="tel">
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}">
                            <i class="bi bi-exclamation-circle"></i> <span th:errors="*{phone}"></span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="password">Mật Khẩu</label>
                        <div class="input-group-custom">
                            <input type="password" id="password" th:field="*{passwordHash}"
                                   th:classappend="${#fields.hasErrors('passwordHash')} ? 'is-invalid'" placeholder="Tối thiểu 8 ký tự" autocomplete="new-password">
                            <button class="eye-btn-custom" type="button" onclick="togglePwd('password','ei1')" aria-label="Toggle password visibility">
                                <i class="bi bi-eye" id="ei1"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('passwordHash')}">
                            <i class="bi bi-exclamation-circle"></i> <span th:errors="*{passwordHash}"></span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="confirmPassword">Xác Nhận Mật Khẩu</label>
                        <div class="input-group-custom">
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                            <button class="eye-btn-custom" type="button" onclick="togglePwd('confirmPassword','ei2')" aria-label="Toggle confirm password visibility">
                                <i class="bi bi-eye" id="ei2"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}">
                            <i class="bi bi-exclamation-circle"></i> <span th:errors="*{confirmPassword}"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 10px;">
                        <span>ĐĂNG KÝ</span>
                    </button>
                </form>

                <div class="foot-note">
                    Đã có tài khoản?
                    <a th:href="@{/auth/login}">ĐĂNG NHẬP</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* 1. Thao tác ẩn/hiện mật khẩu */
        function togglePwd(inputId, iconId) {
            const el = document.getElementById(inputId);
            const ic = document.getElementById(iconId);
            const show = el.type === 'password';
            el.type = show ? 'text' : 'password';
            ic.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        }

        /* 2. Logic chọn Country -> Tự động điền dữ liệu Phone Code */
        function syncPhoneCode(sel) {
            const opt = sel.options[sel.selectedIndex];
            const code = opt ? opt.getAttribute('data-phone') : '';

            const badge = document.getElementById('phoneCodeBadge');
            const hiddenInput = document.getElementById('phoneCode');

            if (code) {
                if (badge) badge.querySelector('span').textContent = code;
                if (hiddenInput) hiddenInput.value = code;
            } else {
                if (badge) badge.querySelector('span').textContent = '—';
                if (hiddenInput) hiddenInput.value = '';
            }
        }

        /* 3. Tự động chạy khi load trang để giữ lại mã vùng nếu validation lỗi */
        document.addEventListener("DOMContentLoaded", function() {
            const countrySel = document.getElementById('countryId');
            if (countrySel && countrySel.value) {
                syncPhoneCode(countrySel);
            }
        });
    </script>
    </body>
    </html>
