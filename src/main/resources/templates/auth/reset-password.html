<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V'Hotel Hanoi | Reset Password</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/auth/auth-base.css}">
    <link rel="stylesheet" th:href="@{/auth/Login.css}">
</head>
<body>

<div class="shell">

    <!-- LEFT BRAND PANEL -->
    <div class="panel-left">
        <img th:src="'https://i.pinimg.com/736x/4b/17/01/4b1701adbebca62f9771777df839a384.jpg'"
             alt="V'Hotel Hanoi lobby">

        <div class="left-content">
            <div class="wordmark">
                <div class="wordmark-line"></div>
                <div class="wordmark-text">Est. 2018 &middot; Hanoi, Vietnam</div>
            </div>

            <div class="brand-block">
                <div class="brand-eyebrow">Luxury Boutique Collection</div>
                <div class="brand-name">
                    V'HOTEL
                    <span>Hanoi</span>
                </div>
                <div class="brand-rule"></div>
                <div class="brand-tagline">Secure Access</div>
            </div>
        </div>

        <div class="ribbon">PASSWORD RECOVERY</div>
    </div>

    <!-- RIGHT FORM PANEL -->
    <div class="panel-right">
        <div class="form-wrap">

            <div class="badge">
                <div class="badge-dot"></div>
                <div class="badge-text">Reset Password</div>
            </div>

            <h1 class="form-heading">
                Create<br>
                <em>New Password.</em>
            </h1>

            <p class="form-sub">
                Please enter your new password below.<br>
                This reset link is valid for a limited time.
            </p>

            <div class="h-rule"></div>

            <div th:if="${errorMessage}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/auth/reset-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="field">
                    <label for="newPassword">New Password</label>
                    <input type="password"
                           id="newPassword"
                           name="newPassword"
                           placeholder="Enter new password"
                           required>
                </div>

                <div class="field">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Confirm new password"
                           required>
                </div>

                <button type="submit" class="btn-primary">
                    <span>RESET PASSWORD</span>
                </button>
            </form>

            <div class="foot-note">
                Remember your password?
                <a th:href="@{/auth/login}">Back to sign in</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
