<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViHotel HMS - Chỉnh sửa phòng</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Common dashboard style -->
    <link rel="stylesheet" th:href="@{/admin/Dashboard.css}">

    <!-- Room page style -->
    <link rel="stylesheet" th:href="@{/admin/RoomManagement.css}">
</head>

<body>
<main layout:fragment="content">
<!-- PAGE TITLE -->

<div class="dashboard-wrapper d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div>
            <div class="logo">
                ViHotel HMS
            </div>

            <ul class="menu list-unstyled">
                <li>
                    <a th:href="@{/admin/dashboard}">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Tổng quan</span>
                    </a>
                </li>

                <li class="active">
                    <a th:href="@{/admin/list_room}">
                        <i class="fa-solid fa-bed"></i>
                        <span>Phòng</span>
                    </a>
                </li>
            </ul>
        </div>

        <a class="sidebar-user text-decoration-none" th:href="@{/profile/edit}">
            <img th:src="${currentUser != null and currentUser.avatarUrl != null
                        ? currentUser.avatarUrl
                        : 'https://i.pravatar.cc/50'}"
                 alt="admin">

            <div>
                <h6 th:text="${currentUser != null
                            ? currentUser.firstName + ' ' + currentUser.lastName
                            : 'QUẢN TRỊ VIÊN'}">
                    QUẢN TRỊ VIÊN
                </h6>
                <p>Cổng quản trị</p>
            </div>
        </a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content flex-grow-1">

        <!-- TOPBAR -->
        <div th:replace="~{fragment/staff/header :: staffHeader}"></div>

        <!-- PAGE TITLE -->
        <section class="welcome-section room-page-title">
            <h1>Chỉnh sửa phòng</h1>
            <p>
                Cập nhật số phòng, hạng phòng, tầng, hướng nhìn và trạng thái hiện tại của phòng.
            </p>
        </section>

        <!-- ERROR MESSAGE -->
        <div th:if="${errorMessage}" class="error-toast">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${errorMessage}">Có lỗi xảy ra!</span>
        </div>

        <!-- EDIT FORM -->
        <section class="room-form-card">

            <div class="form-heading">
                <span>QUẢN LÝ PHÒNG</span>
                <h3>Thông tin phòng</h3>
            </div>

            <form th:action="@{/admin/list_room/edit/{id}(id=${room.id})}" method="post">

                <div class="row g-4">

                    <!-- ROOM NUMBER -->
                    <div class="col-md-6">
                        <label class="form-label">Số phòng</label>
                        <input type="text"
                               name="roomNumber"
                               class="form-control room-input"
                               th:value="${room.roomNumber}"
                               placeholder="Nhập số phòng"
                               required>
                    </div>

                    <!-- ROOM TYPE -->
                    <div class="col-md-6">
                        <label class="form-label">Hạng phòng</label>

                        <select name="roomTypeId" class="form-select room-input" required>
                            <option value="">-- Chọn hạng phòng --</option>

                            <option th:each="type : ${roomTypes}"
                                    th:value="${type.id}"
                                    th:text="${type.name}"
                                    th:selected="${room.roomType != null and room.roomType.id == type.id}">
                                DELUXE
                            </option>
                        </select>
                    </div>

                    <!-- FLOOR -->
                    <div class="col-md-6">
                        <label class="form-label">Tầng</label>
                        <input type="number"
                               name="floor"
                               class="form-control room-input"
                               th:value="${room.floor}"
                               placeholder="Nhập tầng"
                               min="1"
                               required>
                    </div>

                    <!-- VIEW TYPE -->
                    <div class="col-md-6">
                        <label class="form-label">Hướng nhìn</label>

                        <select name="viewType" class="form-select room-input" required>
                            <option value="">-- Chọn hướng nhìn --</option>

                            <option th:each="view : ${viewTypes}"
                                    th:value="${view}"
                                    th:selected="${room.viewType != null and room.viewType == view}"
                                    th:text="${view.name() == 'SEA' ? 'Hướng biển' :
                                             (view.name() == 'CITY' ? 'Hướng thành phố' :
                                             (view.name() == 'POOL' ? 'Hướng hồ bơi' :
                                             (view.name() == 'GARDEN' ? 'Hướng vườn' : view)))}">
                                Hướng thành phố
                            </option>
                        </select>
                    </div>

                    <!-- STATUS -->
                    <div class="col-md-6">
                        <label class="form-label">Trạng thái</label>

                        <select name="status" class="form-select room-input" required>
                            <option value="">-- Chọn trạng thái --</option>

                            <option th:each="status : ${roomStatuses}"
                                    th:value="${status}"
                                    th:selected="${room.status != null and room.status == status}"
                                    th:text="${status.name() == 'AVAILABLE' ? 'Còn trống' :
                                             (status.name() == 'OCCUPIED' ? 'Đang sử dụng' :
                                             (status.name() == 'MAINTENANCE' ? 'Bảo trì' : status))}">
                                Còn trống
                            </option>
                        </select>
                    </div>

                </div>

                <!-- ACTION BUTTONS -->
                <div class="form-actions">
                    <a th:href="@{/admin/list_room}" class="cancel-btn">
                        <i class="fa-solid fa-arrow-left"></i>
                        Quay lại
                    </a>

                    <button type="submit" class="save-room-btn">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Lưu thay đổi
                    </button>
                </div>

            </form>

        </section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</main>
</body>
</html>
