<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViHotel HMS - Cập nhật phòng</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Common dashboard style -->
    <link rel="stylesheet" th:href="@{/admin/Dashboard.css}">

    <!-- Room page style -->
    <link rel="stylesheet" th:href="@{/admin/RoomManagement.css}">
</head>

<body>

<div class="dashboard-wrapper d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            ViHotel HMS
        </div>

        <ul class="menu list-unstyled">
            <li>
                <a th:href="@{/admin/dashboard}">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Bảng điều khiển</span>
                </a>
            </li>

            <li class="active">
                <a th:href="@{/admin/list_room}">
                    <i class="fa-solid fa-bed"></i>
                    <span>Phòng</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-user">
            <div>
                <h6>QUẢN TRỊ HỆ THỐNG</h6>
                <p>Cổng quản trị</p>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content flex-grow-1">

        <!-- TOPBAR -->
        <header class="topbar d-flex justify-content-between align-items-center">
            <h4>CẬP NHẬT PHÒNG</h4>
        </header>

        <!-- PAGE TITLE -->
        <section class="welcome-section room-page-title">
            <h1>Cập nhật phòng</h1>
            <p>
                Cập nhật số phòng, hạng phòng, tầng, hướng nhìn và trạng thái phòng.
            </p>
        </section>

        <!-- ERROR MESSAGE -->
        <div th:if="${errorMessage}" class="alert alert-danger">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${errorMessage}">Đã xảy ra lỗi khi cập nhật phòng!</span>
        </div>

        <!-- FORM CARD -->
        <section class="edit-room-card">

            <form th:action="@{/admin/list_room/edit/{id}(id=${room.id})}" method="post">

                <div class="row">

                    <!-- Room Number -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Số phòng</label>
                        <input type="text"
                               name="roomNumber"
                               class="form-control"
                               th:value="${room.roomNumber}"
                               placeholder="Nhập số phòng"
                               required>
                    </div>

                    <!-- Room Type -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Hạng phòng</label>

                        <select name="roomTypeId" class="form-select" required>
                            <option value="">-- Chọn hạng phòng --</option>

                            <option th:each="type : ${roomTypes}"
                                    th:value="${type.id}"
                                    th:text="${type.name}"
                                    th:selected="${room.roomType != null and room.roomType.id == type.id}">
                            </option>
                        </select>
                    </div>

                    <!-- Floor -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Tầng</label>
                        <input type="number"
                               name="floor"
                               class="form-control"
                               th:value="${room.floor}"
                               placeholder="Nhập tầng"
                               required>
                    </div>

                    <!-- View Type -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Hướng nhìn</label>

                        <select name="viewType" class="form-select" required>
                            <option value="">-- Chọn hướng nhìn --</option>

                            <option th:each="view : ${viewTypes}"
                                    th:value="${view}"
                                    th:text="${view.name() == 'CITY' ? 'Hướng thành phố' :
                                             (view.name() == 'SEA' ? 'Hướng biển' :
                                             (view.name() == 'GARDEN' ? 'Hướng vườn' :
                                             (view.name() == 'POOL' ? 'Hướng hồ bơi' : view)))}"
                                    th:selected="${room.viewType != null and room.viewType == view}">
                            </option>
                        </select>
                    </div>

                    <!-- Status -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Trạng thái</label>

                        <select name="status" class="form-select" required>
                            <option value="">-- Chọn trạng thái --</option>

                            <option th:each="status : ${roomStatuses}"
                                    th:value="${status}"
                                    th:text="${status.name() == 'AVAILABLE' ? 'Còn trống' :
                                             (status.name() == 'OCCUPIED' ? 'Đang sử dụng' :
                                             (status.name() == 'MAINTENANCE' ? 'Đang bảo trì' : status))}"
                                    th:selected="${room.status != null and room.status == status}">
                            </option>
                        </select>
                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="edit-form-actions">
                    <a th:href="@{/admin/list_room}" class="btn-back-room">
                        <i class="fa-solid fa-arrow-left"></i>
                        Quay lại
                    </a>

                    <button type="submit" class="btn-save-room">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Lưu thay đổi
                    </button>
                </div>

            </form>

        </section>

    </main>
</div>

</body>
</html>
