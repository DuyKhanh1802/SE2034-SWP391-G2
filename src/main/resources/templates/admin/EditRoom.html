<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViHotel HMS - Edit Room</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Common dashboard style -->
    <link rel="stylesheet" th:href="@{/admin/Dashboard.css}">

    <!-- Room page style -->
    <link rel="stylesheet" th:href="@{/admin/RoomManagement.css}">
</head>

<body>

<div class="dashboard-wrapper d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div>
            <div class="logo">
                ViHotel HMS
            </div>

            <ul class="menu list-unstyled">
                <li>
                    <a th:href="@{/admin/dashboard}">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li class="active">
                    <a th:href="@{/admin/list_room}">
                        <i class="fa-solid fa-bed"></i>
                        <span>Rooms</span>
                    </a>
                </li>
            </ul>
        </div>

        <a class="sidebar-user text-decoration-none" th:href="@{/profile/edit}">
            <img th:src="${currentUser != null and currentUser.avatarUrl != null
                        ? currentUser.avatarUrl
                        : 'https://i.pravatar.cc/50'}"
                 alt="admin">

            <div>
                <h6 th:text="${currentUser != null
                            ? currentUser.firstName + ' ' + currentUser.lastName
                            : 'SYSTEM ADMIN'}">
                    SYSTEM ADMIN
                </h6>
                <p>Admin Portal</p>
            </div>
        </a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content flex-grow-1">

        <!-- TOPBAR -->
        <div th:replace="~{fragment/staff/header :: staffHeader}"></div>

        <!-- PAGE TITLE -->
        <section class="welcome-section room-page-title">
            <h1>Edit Room</h1>
            <p>
                Update room number, room type, floor, view type, and room status.
            </p>
        </section>

        <!-- ERROR MESSAGE -->
        <div th:if="${errorMessage}" class="error-toast">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${errorMessage}">Error message</span>
        </div>

        <!-- EDIT FORM -->
        <section class="room-form-card">

            <div class="form-heading">
                <span>ROOM MANAGEMENT</span>
                <h3>Room Information</h3>
            </div>

            <form th:action="@{/admin/rooms/edit/{id}(id=${room.id})}" method="post">

                <div class="row g-4">

                    <!-- ROOM NUMBER -->
                    <div class="col-md-6">
                        <label class="form-label">Room Number</label>
                        <input type="text"
                               name="roomNumber"
                               class="form-control room-input"
                               th:value="${room.roomNumber}"
                               placeholder="Enter room number"
                               required>
                    </div>

                    <!-- ROOM TYPE -->
                    <div class="col-md-6">
                        <label class="form-label">Room Type</label>

                        <select name="roomTypeId" class="form-select room-input" required>
                            <option value="">-- Select Room Type --</option>

                            <option th:each="type : ${roomTypes}"
                                    th:value="${type.id}"
                                    th:text="${type.name}"
                                    th:selected="${room.roomType != null and room.roomType.id == type.id}">
                                DELUXE
                            </option>
                        </select>
                    </div>

                    <!-- FLOOR -->
                    <div class="col-md-6">
                        <label class="form-label">Floor</label>
                        <input type="number"
                               name="floor"
                               class="form-control room-input"
                               th:value="${room.floor}"
                               placeholder="Enter floor"
                               min="1"
                               required>
                    </div>

                    <!-- VIEW TYPE -->
                    <div class="col-md-6">
                        <label class="form-label">View Type</label>

                        <select name="viewType" class="form-select room-input" required>
                            <option value="">-- Select View Type --</option>

                            <option th:each="view : ${viewTypes}"
                                    th:value="${view}"
                                    th:text="${view}"
                                    th:selected="${room.viewType != null and room.viewType == view}">
                                CITY
                            </option>
                        </select>
                    </div>

                    <!-- STATUS -->
                    <div class="col-md-6">
                        <label class="form-label">Status</label>

                        <select name="status" class="form-select room-input" required>
                            <option value="">-- Select Status --</option>

                            <option th:each="status : ${roomStatuses}"
                                    th:value="${status}"
                                    th:text="${status}"
                                    th:selected="${room.status != null and room.status == status}">
                                AVAILABLE
                            </option>
                        </select>
                    </div>

                </div>

                <!-- ACTION BUTTONS -->
                <div class="form-actions">
                    <a th:href="@{/admin/list_room}" class="cancel-btn">
                        <i class="fa-solid fa-arrow-left"></i>
                        Back
                    </a>

                    <button type="submit" class="save-room-btn">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save
                    </button>
                </div>

            </form>

        </section>  `

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
