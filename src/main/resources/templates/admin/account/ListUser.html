<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>

<main layout:fragment="content" class="min-h-screen flex flex-col bg-background">
    <div class="px-8 max-w-7xl mx-auto pt-10 pb-20 w-full">
        <section class="mb-12">
            <h3 class="text-5xl font-garamond text-primary mb-2">Accounts Management</h3>

            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mt-12 mb-8">
                <h2 class="text-3xl font-garamond text-primary">Staff Directory</h2>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                        <input class="pl-10 pr-4 py-2 bg-white border border-outline-variant text-sm focus:ring-0 focus:border-primary transition-soft" placeholder="Search users..." type="text">
                    </div>
                    <a th:href="@{/admin/accounts/add}" class="bg-primary text-bone-white px-6 py-2.5 text-xs font-bold tracking-widest uppercase hover:bg-charcoal-muted transition-soft cursor-pointer">
                        Add User
                    </a>
                </div>
            </div>

            <div class="overflow-x-auto border border-outline-variant bg-white">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-surface-container-low border-b border-outline-variant">
                    <tr class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">
                        <th class="px-6 py-4 font-bold">#</th>
                        <th class="px-6 py-4 font-bold">Full Name</th>
                        <th class="px-6 py-4 font-bold">Email</th>
                        <th class="px-6 py-4 font-bold">Role</th>
                        <th class="px-6 py-4 font-bold">Status</th>
                        <th class="px-6 py-4 font-bold">Approval</th>
                        <th class="px-6 py-4 font-bold text-right">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="text-sm text-on-surface-variant font-manrope">
                    <tr th:each="user, iterStat : ${users}" class="border-b border-outline-variant hover:bg-surface-container-low transition-soft">
                        <td class="px-6 py-4" th:text="${iterStat.count}">01</td>
                        <td class="px-6 py-4 font-medium text-primary" th:text="${user.firstName + ' ' + user.lastName}">Erik Johansson</td>
                        <td class="px-6 py-4" th:text="${user.email}">erik@nordic.st</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 bg-surface-container-highest text-[10px] font-bold uppercase tracking-wider" th:text="${user.userType}">ADMIN</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <span class="w-1.5 h-1.5 rounded-full" th:classappend="${user.isActive} ? 'bg-green-600' : 'bg-outline-variant'"></span>
                                <span th:text="${user.isActive} ? 'Active' : 'Inactive'">Active</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 font-bold" th:classappend="${user.approvalStatus.name() == 'PENDING'} ? 'text-orange-500' : (${user.approvalStatus.name() == 'APPROVED'} ? 'text-green-600' : 'text-red-500')" th:text="${user.approvalStatus}">
                            APPROVED
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-3">
                                <a th:href="@{/admin/accounts/{id}(id=${user.id})}" class="material-symbols-outlined text-[18px] hover:text-primary transition-soft cursor-pointer text-on-surface-variant">visibility</a>
                                <a th:href="@{/admin/accounts/{id}/edit(id=${user.id})}" class="material-symbols-outlined text-[18px] hover:text-primary transition-soft cursor-pointer text-on-surface-variant">edit</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

</body>
</html>
