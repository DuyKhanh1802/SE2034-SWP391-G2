<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>

<main layout:fragment="content" class="p-4 p-md-5 bg-light min-vh-100">
    <div class="container-fluid max-w-7xl">
        <section class="mb-5">
            <h3 class="display-5 mb-2" style="font-family: 'EB Garamond', serif;">Accounts Management</h3>

            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mt-5 mb-4 gap-3">
                <h2 class="h4 m-0" style="font-family: 'EB Garamond', serif;">Staff Directory</h2>

                <div class="d-flex align-items-center gap-3">
                    <form th:action="@{/admin/account}" method="get" class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-0" id="search-addon">
                            <i class="fa fa-search text-secondary"></i>
                        </span>
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control border-start-0 rounded-0 shadow-none" placeholder="Search users..." aria-describedby="search-addon">
                        <button type="submit" class="d-none"></button>
                    </form>

                    <a th:href="@{/admin/account/add}" class="btn btn-dark rounded-0 px-4 py-2 text-uppercase fw-semibold text-nowrap d-flex align-items-center gap-2" style="letter-spacing: 1px;">
                        <i class="fa fa-user-plus"></i> NEW STAFF
                    </a>
                </div>
            </div>

            <div class="bg-white border p-0 table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light border-bottom">
                    <tr>
                        <th class="text-uppercase text-secondary fw-semibold py-3 px-4" style="font-size: 0.8rem; letter-spacing: 1px;">Name</th>
                        <th class="text-uppercase text-secondary fw-semibold py-3 px-4" style="font-size: 0.8rem; letter-spacing: 1px;">Role</th>
                        <th class="text-uppercase text-secondary fw-semibold py-3 px-4" style="font-size: 0.8rem; letter-spacing: 1px;">Email / Phone</th>
                        <th class="text-uppercase text-secondary fw-semibold py-3 px-4" style="font-size: 0.8rem; letter-spacing: 1px;">Status</th>
                        <th class="text-uppercase text-secondary fw-semibold py-3 px-4" style="font-size: 0.8rem; letter-spacing: 1px;">Approval</th>
                        <th class="text-uppercase text-secondary fw-semibold py-3 px-4 text-end" style="font-size: 0.8rem; letter-spacing: 1px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td class="px-4 py-3">
                            <div class="fw-bold text-dark" th:text="${user.firstName + ' ' + user.lastName}">Full Name</div>
                            <div class="text-muted small" th:text="'ID: ' + ${user.id}">ID: 1</div>
                        </td>
                        <td class="px-4 py-3">
                            <span class="border border-dark px-2 py-1 text-dark fw-bold small text-uppercase" th:text="${user.userType}">ROLE</span>
                        </td>
                        <td class="px-4 py-3 small text-secondary">
                            <div th:text="${user.email}">email@example.com</div>
                            <div th:text="${user.phone}">0123456789</div>
                        </td>
                        <td class="px-4 py-3 small">
                            <i class="fa fa-circle me-1" th:classappend="${user.isActive} ? 'text-success' : 'text-secondary'" style="font-size: 8px;"></i>
                            <span th:text="${user.isActive} ? 'Active' : 'Inactive'">Active</span>
                        </td>
                        <td class="px-4 py-3 fw-bold small"
                            th:classappend="${user.approvalStatus?.name() == 'PENDING'} ? 'text-warning' : (${user.approvalStatus?.name() == 'APPROVED'} ? 'text-success' : 'text-danger')"
                            th:text="${user.approvalStatus != null ? user.approvalStatus : 'N/A'}">
                            APPROVED
                        </td>
                        <td class="px-4 py-3 text-end">
                            <a th:href="@{/admin/account/{id}(id=${user.id})}" class="text-secondary text-decoration-none me-3"><i class="fa fa-eye"></i></a>
                            <a th:href="@{/admin/account/{id}/edit(id=${user.id})}" class="text-secondary text-decoration-none"><i class="fa fa-pen"></i></a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

</body>
</html>
