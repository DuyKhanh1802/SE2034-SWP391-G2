<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>

<main layout:fragment="content" class="bg-light min-vh-100 p-4 p-md-5">
    <div class="container mx-auto" style="max-width: 800px;">

        <div th:if="${param.success}" class="alert alert-light border-0 border-start border-4 border-dark rounded-0 mb-5 d-flex align-items-center gap-3 shadow-sm">
            <i class="fa fa-check-circle fs-4 text-dark"></i>
            <span class="text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.85rem;">
                Staff account successfully created and is pending approval.
            </span>
        </div>

        <div class="mb-5">
            <h2 class="display-6 mb-2 text-dark" style="font-family: 'EB Garamond', serif;">Add New User</h2>
            <div style="width: 50px; height: 1px; background-color: black;"></div>
        </div>

        <div class="bg-white border p-4 p-md-5">
            <form th:action="@{/admin/account/add}" th:object="${accountRequest}" method="post">
                <div class="row g-5">

                    <div class="col-md-6">
                        <div class="mb-4">
                            <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">First Name</label>
                            <input th:field="*{firstName}" type="text" required class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none" placeholder="Enter first name">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Last Name</label>
                            <input th:field="*{lastName}" type="text" required class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none" placeholder="Enter last name">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Email Address</label>
                            <input th:field="*{email}" type="email" required class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none" placeholder="Enter work email">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-4">
                            <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Phone Number</label>
                            <input th:field="*{phone}" type="text" required class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none" placeholder="Enter phone number">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Password</label>
                            <input th:field="*{password}" type="password" required class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none" placeholder="Enter temporary password">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Role</label>
                            <select th:field="*{roleName}" required class="form-select border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none cursor-pointer">
                                <option value="" disabled selected>Select Access Level</option>
                                <option value="ADMIN">Administrator</option>
                                <option value="MANAGER">Manager</option>
                                <option value="RECEPTIONIST">Receptionist</option>
                            </select>
                        </div>
                    </div>

                </div>

                <div class="mt-5 pt-4">
                    <button type="submit" class="btn btn-dark rounded-0 px-5 py-3 text-uppercase fw-semibold w-100 d-md-inline-block w-md-auto" style="letter-spacing: 1px;">
                        Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
