<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>

<main layout:fragment="content" class="bg-light min-vh-100 p-4 p-md-5">
    <div class="container mx-auto" style="max-width: 800px;">

        <div class="mb-5">
            <h2 class="display-6 mb-2 text-dark" style="font-family: 'EB Garamond', serif;">Edit User</h2>
            <div style="width: 50px; height: 1px; background-color: black;"></div>
        </div>

        <form th:action="@{/admin/account/{id}/edit(id=${user.id})}" th:object="${updateRequest}" method="post">
            <div class="row g-5">
                <div class="col-md-6">
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">First Name</label>
                        <input th:field="*{firstName}" type="text" class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none rounded-0">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Last Name</label>
                        <input th:field="*{lastName}" type="text" class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none rounded-0">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Phone Number</label>
                        <input th:field="*{phone}" type="text" class="form-control border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none rounded-0">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">User Role</label>
                        <select th:field="*{roleName}" class="form-select border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none rounded-0 cursor-pointer">
                            <option value="ADMIN">Administrator</option>
                            <option value="MANAGER">Manager</option>
                            <option value="RECEPTIONIST">Receptionist</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-secondary fw-semibold small" style="letter-spacing: 1px;">Account Status</label>
                        <select th:field="*{isActive}" class="form-select border-0 border-bottom border-dark rounded-0 px-0 bg-transparent shadow-none rounded-0 cursor-pointer">
                            <option th:value="true">Active (Can Login)</option>
                            <option th:value="false">Inactive (Suspended)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-5 pt-4 border-top d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-4">
                <div>
                    <h4 class="h6 text-uppercase text-secondary mb-1 fw-bold" style="letter-spacing: 1px;">Update Action</h4>
                    <p class="text-muted small mb-0">Make sure all assigned roles comply with access control.</p>
                </div>
                <button type="submit" class="btn btn-dark rounded-0 px-5 py-3 text-uppercase fw-semibold" style="letter-spacing: 1px;">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
