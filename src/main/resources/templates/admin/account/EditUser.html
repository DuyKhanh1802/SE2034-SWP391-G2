<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>

<main layout:fragment="content" class="min-h-screen bg-background">
    <div class="max-w-4xl mx-auto px-8 py-16">

        <div class="mb-12">
            <h2 class="font-headline-lg text-headline-lg text-primary mb-2">Edit User</h2>
            <div class="w-12 h-[1px] bg-primary"></div>
        </div>

        <form th:action="@{/admin/account/{id}/edit(id=${user.id})}" th:object="${updateRequest}" method="post">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-12">
                    <section class="space-y-8">
                        <div>
                            <label class="font-label-caps text-label-caps block mb-4 text-on-surface-variant">FIRST NAME</label>
                            <input th:field="*{firstName}" type="text" class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-primary transition-all">
                        </div>
                        <div>
                            <label class="font-label-caps text-label-caps block mb-4 text-on-surface-variant">LAST NAME</label>
                            <input th:field="*{lastName}" type="text" class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-primary transition-all">
                        </div>
                        <div>
                            <label class="font-label-caps text-label-caps block mb-4 text-on-surface-variant">PHONE</label>
                            <input th:field="*{phone}" type="text" class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-primary transition-all">
                        </div>
                    </section>

                    <section class="p-8 bg-bone-white border border-outline-variant">
                        <label class="font-label-caps text-label-caps block mb-6 text-on-surface-variant">ACCOUNT STATUS</label>
                        <div class="flex items-center gap-6">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="radio" th:field="*{isActive}" value="true" class="w-4 h-4 text-primary focus:ring-0 border-outline-variant">
                                <span class="font-label-caps text-label-caps">ACTIVE</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="radio" th:field="*{isActive}" value="false" class="w-4 h-4 text-primary focus:ring-0 border-outline-variant">
                                <span class="font-label-caps text-label-caps">SUSPENDED</span>
                            </label>
                        </div>
                    </section>
                </div>

                <div class="space-y-12">
                    <section class="space-y-8">
                        <div>
                            <label class="font-label-caps text-label-caps block mb-4 text-on-surface-variant">USER ROLE</label>
                            <div class="relative">
                                <select th:field="*{roleName}" class="w-full appearance-none bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-primary cursor-pointer">
                                    <option value="ADMIN">Administrator</option>
                                    <option value="MANAGER">Manager</option>
                                    <option value="RECEPTIONIST">Receptionist</option>
                                </select>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <div class="mt-12 pt-8 border-t border-outline-variant flex justify-between items-end">
                <div class="max-w-xs">
                    <h4 class="font-label-caps text-label-caps text-on-surface-variant mb-2">UPDATE ACTION</h4>
                    <p class="text-sm text-on-surface-variant opacity-70">Make sure all assigned roles comply with access control.</p>
                </div>
                <button type="submit" class="font-label-caps text-label-caps px-12 py-4 bg-primary text-bone-white hover:bg-charcoal-muted transition-all shadow-sm">
                    SAVE CHANGES
                </button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
