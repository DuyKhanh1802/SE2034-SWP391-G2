<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/staff-layout}">
<body>

<main layout:fragment="content" class="min-h-screen bg-background flex flex-col">
    <section class="flex-grow px-8 py-12 max-w-7xl mx-auto w-full">
        <header class="flex justify-between items-center w-full mb-12 bg-transparent">
            <a th:href="@{/admin/accounts}" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                <span class="font-label-caps text-label-caps">Back to List</span>
            </a>
        </header>

        <div class="grid grid-cols-12 gap-8 items-start">
            <div class="col-span-12 lg:col-span-4 flex flex-col gap-6">
                <div class="bg-bone-white border border-outline-variant p-2 aspect-[4/5] relative">
                    <img th:src="@{/images/default-avatar.png}" alt="Avatar" class="w-full h-full object-cover">
                    <div class="absolute bottom-6 left-6 bg-primary text-bone-white px-3 py-1 flex items-center gap-2" th:if="${user.isActive}">
                        <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                        <span class="font-label-caps text-[10px] tracking-[0.2em] uppercase">Active Session</span>
                    </div>
                </div>
                <div>
                    <h2 class="text-4xl font-garamond text-primary" th:text="${user.firstName + ' ' + user.lastName}">Anders Holm</h2>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8 flex flex-col gap-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                    <div class="border-b border-outline-variant pb-4">
                        <p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase opacity-60">Email Address</p>
                        <p class="font-body-lg text-primary" th:text="${user.email}">email@domain.com</p>
                    </div>
                    <div class="border-b border-outline-variant pb-4">
                        <p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase opacity-60">Phone Number</p>
                        <p class="font-body-lg text-primary" th:text="${user.phone}">+45 0000</p>
                    </div>
                    <div class="border-b border-outline-variant pb-4">
                        <p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase opacity-60">Primary Role</p>
                        <p class="font-body-lg text-primary" th:text="${user.userType}">STAFF</p>
                    </div>
                    <div class="border-b border-outline-variant pb-4">
                        <p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase opacity-60">Approval Status</p>
                        <p class="font-body-lg text-primary font-bold" th:text="${user.approvalStatus}">APPROVED</p>
                    </div>
                    <div class="border-b border-outline-variant pb-4">
                        <p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase opacity-60">Join Date</p>
                        <p class="font-body-lg text-primary" th:text="${#dates.format(user.createdAt, 'MMM dd, yyyy')}">Oct 12, 2023</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 mt-12">
                    <a th:href="@{/admin/accounts/{id}/edit(id=${user.id})}" class="px-8 py-3 bg-primary text-bone-white font-button-text uppercase hover:bg-charcoal-muted transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">edit</span> Edit User
                    </a>

                    <form th:if="${user.approvalStatus.name() == 'PENDING'}" th:action="@{/admin/accounts/{id}/review(id=${user.id})}" method="post" class="flex gap-2">
                        <button type="submit" name="action" value="approve" class="px-6 py-3 border border-green-600 text-green-600 font-button-text uppercase hover:bg-green-50 transition-all">
                            Approve
                        </button>
                        <button type="submit" name="action" value="reject" class="px-6 py-3 border border-red-600 text-red-600 font-button-text uppercase hover:bg-red-50 transition-all">
                            Reject
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

</body>
</html>
